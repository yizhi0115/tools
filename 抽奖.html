<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业抽奖系统</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心库 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用于在浏览器中实时编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 SheetJS 用于解析 Excel 和 CSV 结构化数据 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback } = React;

        // --- 静态图标组件 ---
        const IconUploadCloud = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M12 12v9"></path><path d="m16 16-4-4-4 4"></path></svg>;
        const IconPlay = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconRotateCcw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;
        const IconUsers = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
        const IconSettings = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const IconFileText = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const IconTrophy = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconMenu = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const IconX = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconLayers = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;

        // --- 全局核心数据过滤函数 ---
        const cleanAndExtractEntity = (rawStr) => {
            if (!rawStr) return null;
            let str = String(rawStr).replace(/\s/g, ''); 
            
            if (str.length < 2) return null;
            // 严控：绝不接受带有数字的记录（剔除电话、地址、学号等）
            if (/\d/.test(str)) return null;

            // 智能实体截断（解决括号及特定备注句式的长文本）
            if (str.length > 4 || /[()（），。：；]/.test(str)) {
                const match = str.match(/^([\u4e00-\u9fa5·•]{2,10})(?:是|因|为|走读|请假|缺勤|无需|完成|，|,|。|：|:|；|;|（|\()/);
                if (match && match[1]) {
                    str = match[1]; // 截断后重新赋值，必须进入下方的黑名单校验
                }
            }

            // 防御拦截网：针对企业名称、行政地址、组织机构的关键词封杀
            if (str.length > 3 && /(省|市|区|县|街道|路|街|巷|公司|事务所|合伙|集团|中心|大厦|广场|单元|大队|学校|学院|专业|委员会)/.test(str)) return null;
            if (/[号室楼栋层]$/.test(str)) return null;

            // 通用表头及无效字段硬编码黑名单
            const excludeHeaders = [
                '姓名', '名字', '名单', '人员', '员工', '序号', '编号', '部门', '职务', '性别', 
                '备注', '电话', '手机', '平时', '期末', '总评', '成绩', '出勤', '考核', '晨跑', 
                '学号', '组别', '班级', '专业', '学院', '当值', '周次', '法定代表人', '联系电话', 
                '机构名称', '注册地址', '工商注册', '负责人', '联系人', '代表', '职务'
            ];
            if (excludeHeaders.some(ex => str.includes(ex))) return null;
            
            // 常规姓名的极限长度约束
            if (str.length > 15) return null;
            
            return str;
        };

        function LotterySystem() {
            const [candidates, setCandidates] = useState([]);
            const [rawText, setRawText] = useState('');
            const [isDrawing, setIsDrawing] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            
            const [currentDisplay, setCurrentDisplay] = useState(['系统已就绪']);
            const [winners, setWinners] = useState(null);
            const [drawCount, setDrawCount] = useState(1);
            const [removeWinner, setRemoveWinner] = useState(true);
            
            const [isMobileSettingsOpen, setIsMobileSettingsOpen] = useState(false);
            const [excelSheets, setExcelSheets] = useState([]); 
            const [activeSheets, setActiveSheets] = useState([]);
            
            const [isDragOver, setIsDragOver] = useState(false);
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            // 处理纯文本输入框的数据解析
            const parseAndSetCandidates = useCallback((text) => {
                const uniqueMap = new Map();

                text.split(/[\n,\t]+/).forEach((item) => {
                    const validEntity = cleanAndExtractEntity(item);
                    if (!validEntity) return;

                    let baseKey = validEntity.replace(/[\d\s\-_.,/!@#$%^&*()+=|\\\[\]{}'";:?><·•]+/g, '').toLowerCase();
                    if (/[\u4e00-\u9fa5]/.test(baseKey)) {
                        baseKey = baseKey.replace(/[a-zA-Z]+/g, '');
                    }
                    if (!baseKey) {
                        baseKey = validEntity.replace(/[a-zA-Z0-9]+$/, '').toLowerCase();
                    }

                    if (!uniqueMap.has(baseKey)) {
                        uniqueMap.set(baseKey, validEntity);
                    }
                });

                setCandidates(Array.from(uniqueMap.values()));
            }, []);

            const handleTextChange = (e) => {
                setRawText(e.target.value);
                parseAndSetCandidates(e.target.value);
            };

            // 数据驱动的列探测算法 (不再依赖表头硬编码)
            const extractNamesFromSheet = (worksheet) => {
                const json = window.XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                if (json.length === 0) return [];

                const numCols = json.reduce((max, row) => Math.max(max, row?.length || 0), 0);
                const targetColIndices = [];

                // 核心重构：列特征统计分析
                for (let c = 0; c < numCols; c++) {
                    let totalNonEmpty = 0;
                    let nameLikeCount = 0;

                    for (let r = 0; r < Math.min(json.length, 500); r++) {
                        const cell = json[r] && json[r][c];
                        if (cell !== undefined && cell !== null) {
                            const str = String(cell).replace(/\s/g, '');
                            if (str.length > 0) {
                                totalNonEmpty++;
                                // 探针特征：长度在2-4之间，且为纯中文或包含间隔号
                                if (str.length >= 2 && str.length <= 4 && /^[\u4e00-\u9fa5·•]+$/.test(str)) {
                                    // 排除典型的表头误判
                                    if (!['姓名', '名字', '名单', '人员', '代表'].includes(str)) {
                                        nameLikeCount++;
                                    }
                                }
                            }
                        }
                    }

                    // 决策阈值：若该列非空数据中超过20%符合纯净姓名特征，且符合数量至少为2，则锁定该列为提取目标
                    if (totalNonEmpty > 0 && nameLikeCount >= 2 && (nameLikeCount / totalNonEmpty) >= 0.2) {
                        targetColIndices.push(c);
                    }
                }

                const rawExtracted = [];

                // 基于探测结果进行精准清洗提取
                if (targetColIndices.length > 0) {
                    json.forEach(row => {
                        targetColIndices.forEach(colIndex => {
                            const val = cleanAndExtractEntity(row[colIndex]);
                            if (val) rawExtracted.push(val);
                        });
                    });
                } else {
                    // 全局遍历兜底
                    json.forEach(row => {
                        (row || []).forEach(cell => {
                            const val = cleanAndExtractEntity(cell);
                            if (val) rawExtracted.push(val);
                        });
                    });
                }

                return rawExtracted;
            };

            const processFile = (file) => {
                if (!file) return;
                
                const fileExt = file.name.split('.').pop().toLowerCase();
                const allowedExts = ['txt', 'csv', 'xlsx', 'xls'];

                if (!allowedExts.includes(fileExt)) {
                    alert('系统提示：仅支持导入 Excel表格 (.xlsx/.xls)、CSV文件及纯文本文档。不支持 PDF 或图像文件。');
                    return;
                }
                
                setIsLoading(true);

                if (['xlsx', 'xls', 'csv'].includes(fileExt)) {
                    if (!window.XLSX) {
                        alert('表格解析组件未就绪，请稍后重试。');
                        setIsLoading(false);
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            // 强制结构化读取，解决 csv 被打散的问题
                            const workbook = window.XLSX.read(data, { type: 'array' });
                            
                            const parsedSheets = [];
                            const defaultActive = [];

                            workbook.SheetNames.forEach(sheetName => {
                                const worksheet = workbook.Sheets[sheetName];
                                const names = extractNamesFromSheet(worksheet);
                                if (names.length > 0) {
                                    parsedSheets.push({ name: sheetName, data: names });
                                    defaultActive.push(sheetName);
                                }
                            });

                            if (parsedSheets.length === 0) {
                                alert('数据提取失败：未能根据结构特征探测到有效的名单列。');
                            } else {
                                setExcelSheets(parsedSheets);
                                setActiveSheets(defaultActive);
                                const combinedNames = parsedSheets.flatMap(s => s.data);
                                const textList = combinedNames.join('\n');
                                setRawText(textList);
                                parseAndSetCandidates(textList);
                            }
                        } catch (error) {
                            console.error('表格解析异常:', error);
                            alert('解析失败，请检查文件编码或结构完整性。');
                        } finally {
                            setIsLoading(false);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const text = e.target.result;
                        setExcelSheets([]);
                        setActiveSheets([]);
                        setRawText(text);
                        parseAndSetCandidates(text);
                        setIsLoading(false);
                    };
                    reader.readAsText(file);
                }
            };

            const handleSheetToggle = (sheetName) => {
                let newActive = [...activeSheets];
                if (newActive.includes(sheetName)) {
                    newActive = newActive.filter(name => name !== sheetName);
                } else {
                    newActive.push(sheetName);
                }
                setActiveSheets(newActive);

                const combinedNames = excelSheets
                    .filter(sheet => newActive.includes(sheet.name))
                    .flatMap(sheet => sheet.data);
                
                const textList = combinedNames.join('\n');
                setRawText(textList);
                parseAndSetCandidates(textList);
            };

            const handleDragOver = (e) => { e.preventDefault(); setIsDragOver(true); };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDragOver(false); };
            const handleDrop = (e) => { e.preventDefault(); setIsDragOver(false); handleFileSelect({ target: { files: e.dataTransfer.files } }); };
            const handleFileSelect = (e) => { if (e.target.files.length > 0) processFile(e.target.files[0]); };

            const fireConfetti = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                const particles = [];
                const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

                for (let i = 0; i < 150; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height - canvas.height,
                        w: Math.random() * 10 + 5,
                        h: Math.random() * 10 + 5,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        speed: Math.random() * 3 + 2,
                        angle: Math.random() * 360,
                        spin: Math.random() * 0.2 - 0.1,
                    });
                }

                let animationFrameId;
                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let activeParticles = 0;
                    particles.forEach((p) => {
                        p.y += p.speed;
                        p.angle += p.spin;
                        if (p.y < canvas.height) activeParticles++;
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.angle);
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                        ctx.restore();
                    });

                    if (activeParticles > 0) {
                        animationFrameId = requestAnimationFrame(render);
                    } else {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                };
                render();
                return () => cancelAnimationFrame(animationFrameId);
            }, []);

            const startDraw = () => {
                if (candidates.length === 0) {
                    alert('名单数据为空，请确认是否成功导入并解析。');
                    return;
                }
                if (candidates.length < drawCount) {
                    alert(`设定抽取人数（${drawCount}）超过现有候选规模（${candidates.length}），请调整。`);
                    return;
                }
                
                const canvas = canvasRef.current;
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }

                setIsDrawing(true);
                setWinners(null);

                const dynamicDuration = Math.min(8000, Math.max(3000, 3000 + (candidates.length * 40)));
                const totalDuration = dynamicDuration; 
                
                const startTime = performance.now();
                let lastUpdateTime = startTime;

                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / totalDuration, 1);

                    if (progress >= 1) {
                        const shuffled = [...candidates].sort(() => 0.5 - Math.random());
                        const finalWinners = shuffled.slice(0, drawCount);
                        
                        setCurrentDisplay(finalWinners);
                        setWinners(finalWinners);
                        setIsDrawing(false);
                        fireConfetti();
                        
                        if (removeWinner) {
                            const remaining = candidates.filter(c => !finalWinners.includes(c));
                            setCandidates(remaining);
                            setRawText(remaining.join('\n'));
                        }
                        return;
                    }

                    const currentInterval = 40 + (410 * Math.pow(progress, 4));

                    if (currentTime - lastUpdateTime >= currentInterval) {
                        const tempDisplay = [];
                        for (let i = 0; i < drawCount; i++) {
                            tempDisplay.push(candidates[Math.floor(Math.random() * candidates.length)]);
                        }
                        setCurrentDisplay(tempDisplay);
                        lastUpdateTime = currentTime;
                    }
                    requestAnimationFrame(animate);
                };
                requestAnimationFrame(animate);
            };

            const resetDraw = () => {
                setWinners(null);
                setCurrentDisplay(['系统已就绪']);
                const canvas = canvasRef.current;
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            };

            const getDisplayTextSize = (text, isWinner, isDrawing, count) => {
                const len = String(text).length;
                if (count >= 10) return isWinner ? 'text-lg sm:text-2xl scale-105' : 'text-base sm:text-xl';
                if (count >= 5) return isWinner ? 'text-xl sm:text-3xl scale-105' : 'text-lg sm:text-2xl';
                if (count > 1) return isWinner ? 'text-2xl sm:text-4xl scale-105' : 'text-xl sm:text-3xl';
                if (len <= 4) return isWinner ? 'text-5xl sm:text-8xl scale-110' : isDrawing ? 'text-4xl sm:text-7xl' : 'text-4xl sm:text-6xl';
                if (len <= 8) return isWinner ? 'text-4xl sm:text-6xl scale-105' : isDrawing ? 'text-3xl sm:text-5xl' : 'text-3xl sm:text-4xl';
                if (len <= 15) return isWinner ? 'text-2xl sm:text-4xl' : isDrawing ? 'text-xl sm:text-3xl' : 'text-xl sm:text-3xl';
                return isWinner ? 'text-xl sm:text-3xl' : isDrawing ? 'text-lg sm:text-2xl' : 'text-lg sm:text-xl';
            };

            return (
                <div className="h-screen w-full bg-slate-900 text-slate-100 flex flex-col lg:flex-row font-sans overflow-hidden">
                <canvas ref={canvasRef} className="fixed top-0 left-0 w-full h-full pointer-events-none z-50" />

                <div className="lg:hidden flex items-center justify-between p-4 bg-slate-800 border-b border-slate-700 z-20 shadow-md shrink-0">
                    <div className="flex items-center space-x-2">
                        <IconTrophy className="text-yellow-500 w-5 h-5" />
                        <h1 className="font-bold tracking-wider text-lg">专业抽奖系统</h1>
                    </div>
                    <button onClick={() => setIsMobileSettingsOpen(true)} className="p-2 bg-slate-700 rounded-md hover:bg-slate-600 transition">
                        <IconMenu className="w-5 h-5 text-slate-200" />
                    </button>
                </div>

                {isMobileSettingsOpen && <div className="fixed inset-0 bg-black/60 z-30 lg:hidden backdrop-blur-sm transition-opacity" onClick={() => setIsMobileSettingsOpen(false)} />}

                <div className={`fixed inset-y-0 left-0 transform ${isMobileSettingsOpen ? 'translate-x-0' : '-translate-x-full'} lg:relative lg:translate-x-0 transition duration-300 ease-in-out z-40 lg:z-10 w-4/5 sm:w-80 lg:w-1/3 lg:max-w-md bg-slate-800 border-r border-slate-700 flex flex-col shadow-2xl lg:shadow-xl`}>
                    <div className="p-4 sm:p-6 border-b border-slate-700 flex items-center justify-between shrink-0">
                        <div className="flex items-center space-x-3">
                            <IconSettings className="text-blue-400 w-6 h-6" />
                            <h1 className="text-xl font-bold tracking-wider">抽奖配置中心</h1>
                        </div>
                        <button className="lg:hidden p-2 text-slate-400 hover:text-white" onClick={() => setIsMobileSettingsOpen(false)}>
                            <IconX className="w-6 h-6" />
                        </button>
                    </div>

                    <div className="p-4 sm:p-6 flex-1 overflow-y-auto flex flex-col space-y-6">
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-slate-700/50 p-4 rounded-lg flex items-center space-x-3">
                                <IconUsers className="text-emerald-400 w-5 h-5" />
                                <div>
                                    <p className="text-xs text-slate-400">有效候选项</p>
                                    <p className="text-lg font-bold">{candidates.length}</p>
                                </div>
                            </div>
                            <div className="bg-slate-700/50 p-4 rounded-lg flex items-center space-x-3">
                                <IconFileText className="text-purple-400 w-5 h-5" />
                                <div>
                                    <p className="text-xs text-slate-400">系统运行状态</p>
                                    <p className="text-lg font-bold text-emerald-400">{isLoading ? '分析中' : '就绪'}</p>
                                </div>
                            </div>
                        </div>

                        <div className="bg-slate-700/30 p-4 rounded-xl border border-slate-700 shadow-inner">
                            <h2 className="text-sm font-semibold text-slate-300 mb-4 flex items-center">
                                <IconSettings className="w-4 h-4 mr-2 text-blue-400" /> 抽取参数设置
                            </h2>
                            <div className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <label className="text-sm text-slate-400 font-medium">单次抽取人数</label>
                                    <input type="number" min="1" max={Math.max(1, candidates.length)} value={drawCount} onChange={(e) => { const val = parseInt(e.target.value) || 1; setDrawCount(Math.min(val, candidates.length > 0 ? candidates.length : 999)); }} disabled={isDrawing || isLoading} className="w-20 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-center text-sm focus:outline-none focus:border-blue-500 transition-colors disabled:opacity-50" />
                                </div>
                                <div className="flex items-center justify-between">
                                    <label className="text-sm text-slate-400 font-medium">中奖后从名单移除</label>
                                    <label className="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" checked={removeWinner} onChange={(e) => setRemoveWinner(e.target.checked)} disabled={isDrawing || isLoading} className="sr-only peer" />
                                        <div className="w-11 h-6 bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500 disabled:opacity-50"></div>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop} onClick={() => !isLoading && fileInputRef.current?.click()} className={`relative border-2 border-dashed rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer transition-colors overflow-hidden ${isDragOver ? 'border-blue-500 bg-blue-500/10' : 'border-slate-600 bg-slate-800 hover:border-slate-500 hover:bg-slate-700'} ${isLoading ? 'opacity-70 cursor-wait' : ''}`}>
                            {isLoading && (
                                <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-10">
                                    <IconRotateCcw className="w-8 h-8 text-blue-500 animate-spin" />
                                </div>
                            )}
                            <IconUploadCloud className={`w-10 h-10 mb-3 ${isDragOver ? 'text-blue-500' : 'text-slate-400'}`} />
                            <p className="text-sm font-medium text-center">点击或拖拽文件至此</p>
                            <p className="text-xs text-slate-500 mt-2 text-center">支持导入 .txt, .csv, .xlsx 格式文件</p>
                            <input type="file" ref={fileInputRef} onChange={handleFileSelect} accept=".txt,.csv,.xlsx,.xls" className="hidden" />
                        </div>

                        <div className="flex flex-col flex-1 min-h-[250px] lg:min-h-0">
                            {excelSheets.length > 1 && (
                                <div className="mb-4 bg-slate-700/30 p-3 rounded-lg border border-slate-700">
                                    <label className="text-xs font-semibold text-slate-300 mb-2 flex items-center"><IconLayers className="w-4 h-4 mr-2 text-blue-400" /> 检测到多个工作表，请勾选需要导入的范围：</label>
                                    <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto">
                                        {excelSheets.map((sheet) => {
                                            const isActive = activeSheets.includes(sheet.name);
                                            return (
                                                <label key={sheet.name} className={`flex items-center space-x-1 text-sm px-3 py-1.5 rounded-full cursor-pointer border transition-all duration-200 select-none ${isActive ? 'bg-blue-600/20 border-blue-500/50 text-blue-300 shadow-[0_0_10px_rgba(59,130,246,0.1)]' : 'bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500 hover:text-slate-200'}`}>
                                                    <input type="checkbox" className="hidden" checked={isActive} onChange={() => handleSheetToggle(sheet.name)} disabled={isDrawing || isLoading} />
                                                    <span className="truncate max-w-[120px]" title={sheet.name}>{sheet.name}</span>
                                                    <span className={`text-xs ${isActive ? 'text-blue-400' : 'opacity-60'}`}>({sheet.data.length}人)</span>
                                                </label>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                            <label className="text-sm font-medium text-slate-400 mb-2 flex justify-between items-center"><span>或在此直接输入名单（换行或逗号分隔）</span></label>
                            <textarea className="flex-1 min-h-[150px] w-full bg-slate-950 border border-slate-700 rounded-lg p-4 text-sm text-slate-300 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none" placeholder="例如：&#10;张三&#10;李四&#10;特等奖&#10;一等奖..." value={rawText} onChange={handleTextChange} disabled={isDrawing || isLoading} />
                        </div>
                    </div>
                </div>

                <div className="flex-1 flex flex-col bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-black relative overflow-hidden">
                    <div className="flex-1 flex flex-col items-center justify-center p-4 sm:p-8 lg:p-12">
                        <div className="relative w-full max-w-4xl h-56 sm:h-72 lg:h-80 mb-8 sm:mb-16 flex items-center justify-center mt-8 lg:mt-0 shrink-0">
                            <div className={`absolute inset-0 rounded-3xl blur-3xl opacity-20 transition-all duration-500 ${isDrawing ? 'bg-blue-600 scale-110' : winners ? 'bg-yellow-500 scale-125 opacity-40' : 'bg-slate-600'}`}></div>
                            <div className={`relative z-10 w-full h-full bg-slate-800/80 backdrop-blur-sm border-2 rounded-3xl flex items-center justify-center overflow-hidden transition-colors duration-300 ${winners ? 'border-yellow-500/50 shadow-[0_0_50px_rgba(234,179,8,0.3)]' : isDrawing ? 'border-blue-500/50' : 'border-slate-700'}`}>
                                <div className="px-4 sm:px-8 py-4 sm:py-6 w-full h-full flex flex-wrap content-center justify-center gap-x-4 sm:gap-x-8 gap-y-4 sm:gap-y-6 overflow-y-auto">
                                    {currentDisplay.map((text, idx) => (
                                        <span key={idx} className={`font-bold text-center break-words ${isDrawing ? '' : 'transition-all duration-500'} ${getDisplayTextSize(text, winners !== null, isDrawing, drawCount)} ${isDrawing ? 'text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.8)] tracking-widest' : winners ? 'text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-yellow-400 to-yellow-600 drop-shadow-[0_0_25px_rgba(234,179,8,0.5)] tracking-widest' : 'text-slate-400 tracking-wider'}`}>{text}</span>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-6 z-10 w-full sm:w-auto px-4 sm:px-0 shrink-0">
                            <button onClick={startDraw} disabled={isDrawing || candidates.length === 0 || isLoading} className={`w-full sm:w-auto flex items-center justify-center space-x-2 px-8 sm:px-12 py-4 sm:py-5 rounded-full font-bold text-lg sm:text-xl transition-all duration-300 ${isDrawing || isLoading ? 'bg-slate-700 text-slate-400 cursor-not-allowed opacity-80' : 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white shadow-[0_0_30px_rgba(79,70,229,0.4)] hover:shadow-[0_0_40px_rgba(79,70,229,0.6)] transform hover:-translate-y-1'}`}>
                                {isDrawing ? (<><IconRotateCcw className="w-5 h-5 sm:w-6 sm:h-6 animate-spin mr-2" /><span>抽取中...</span></>) : (<><IconPlay className="w-5 h-5 sm:w-6 sm:h-6 mr-2" /><span>开始抽取</span></>)}
                            </button>
                            {winners && !isDrawing && (
                                <button onClick={resetDraw} className="w-full sm:w-auto flex items-center justify-center px-6 py-4 sm:py-5 rounded-full font-semibold text-base sm:text-lg bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 transition-all hover:text-white"><IconRotateCcw className="w-5 h-5 mr-2" /><span>重置</span></button>
                            )}
                        </div>
                    </div>
                    <div className="p-3 sm:p-4 text-center text-slate-500 sm:text-slate-600 text-xs sm:text-sm border-t border-slate-800/50 shrink-0">专业抽奖系统 | 数据探针轮廓分析架构</div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LotterySystem />);
    </script>
</body>
</html>
