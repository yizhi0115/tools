<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业抽奖系统</title>
    <!-- 引入 Tailwind CSS 核心库用于页面排版与样式设计 -->
    <script src="https://cdn.tailwindcss.com">
        }); // DOMContentLoaded
    </script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest">
        }); // DOMContentLoaded
    </script>
    <!-- 引入 XLSX 库用于本地 Excel 表格解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js">
        }); // DOMContentLoaded
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
        }
        
        /* 自定义 Toast 动画 */
        .toast-enter { animation: slide-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-leave { animation: slide-out 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes slide-in {
            from { opacity: 0; transform: translate(-50%, -20px) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }
        
        @keyframes slide-out {
            from { opacity: 1; transform: translate(-50%, 0) scale(1); }
            to { opacity: 0; transform: translate(-50%, -20px) scale(0.95); }
        }

        .gradient-bg { background: radial-gradient(ellipse at center, #1e293b 0%, #0f172a 50%, #000000 100%); }
        
        /* 美化滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .hidden-sidebar { transform: translateX(-100%); }
        .visible-sidebar { transform: translateX(0); }

#sidebar:not(.desktop-collapsed){transform:translateX(0)!important}
        #sidebar.desktop-collapsed{transform:translateX(-100%)!important}
        @media(min-width:1024px){#sidebar.desktop-collapsed~#desktop-reopen-btn{display:flex!important}}

        @media(min-width:1024px){#main-content{transition:padding-left .3s ease}#sidebar:not(.desktop-collapsed)~#main-content{padding-left:33.333%}}
    </style>
</head>
<body class="h-screen w-full bg-slate-900 text-slate-100 flex flex-col lg:flex-row overflow-hidden selection:bg-blue-500/30">

    <!-- 全局提示 Toast -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-lg bg-slate-800 border border-slate-600 shadow-2xl flex items-center space-x-3 transition-all opacity-0 pointer-events-none hidden">
        <i data-lucide="alert-circle" class="w-5 h-5 text-blue-400"></i>
        <span id="toast-msg" class="text-sm font-medium tracking-wide text-slate-200"></span>
    </div>

    <!-- 粒子特效 Canvas -->
    <canvas id="confetti-canvas" class="fixed top-0 left-0 w-full h-full pointer-events-none z-50"></canvas>

    <!-- 移动端顶部导航 -->
    <div class="lg:hidden flex items-center justify-between p-4 bg-slate-800 border-b border-slate-700 z-20 shadow-md shrink-0">
        <div class="flex items-center space-x-2">
            <i data-lucide="trophy" class="text-yellow-500 w-5 h-5"></i>
            <h1 class="font-bold tracking-wider text-lg">专业抽奖系统</h1>
        </div>
        <button id="mobile-menu-btn" class="p-2 bg-slate-700 rounded-md hover:bg-slate-600 transition">
            <i data-lucide="menu" class="w-5 h-5 text-slate-200"></i>
        </button>
    </div>

    <!-- 移动端侧边栏遮罩 -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black/60 z-30 lg:hidden backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300"></div>

    <!-- 侧边栏：配置中心 -->
    <div id="sidebar" class="fixed inset-y-0 left-0 transform hidden-sidebar transition-transform duration-300 ease-in-out z-40 lg:z-10 w-4/5 sm:w-80 lg:w-1/3 lg:max-w-md bg-slate-800 border-r border-slate-700 flex flex-col shadow-2xl lg:shadow-xl">
        <div class="p-4 sm:p-6 border-b border-slate-700 flex items-center justify-between shrink-0">
            <div class="flex items-center space-x-3">
                <i data-lucide="settings" class="text-blue-400 w-6 h-6"></i>
                <h1 class="text-xl font-bold tracking-wider">抽奖配置中心</h1>
            </div>
            <button id="desktop-collapse-btn" class="hidden lg:flex p-2 text-slate-400 hover:text-white rounded" title="收起"><i data-lucide="panel-left-close" class="w-5 h-5"></i></button>
            <button id="close-sidebar-btn" class="lg:hidden p-2 text-slate-400 hover:text-white">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="p-4 sm:p-6 flex-1 overflow-y-auto flex flex-col space-y-6">
            <!-- 状态卡片 -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-700/50 p-4 rounded-lg flex items-center space-x-3">
                    <i data-lucide="users" class="text-emerald-400 w-5 h-5"></i>
                    <div>
                        <p class="text-xs text-slate-400">有效候选项</p>
                        <p id="candidate-count" class="text-lg font-bold">0</p>
                    </div>
                </div>
                <div class="bg-slate-700/50 p-4 rounded-lg flex items-center space-x-3">
                    <i data-lucide="file-text" class="text-purple-400 w-5 h-5"></i>
                    <div>
                        <p class="text-xs text-slate-400">系统状态</p>
                        <p id="system-status" class="text-lg font-bold text-emerald-400">正常</p>
                    </div>
                </div>
            </div>

            <!-- 参数设置 -->
            <div class="bg-slate-700/30 p-4 rounded-xl border border-slate-700 shadow-inner">
                <h2 class="text-sm font-semibold text-slate-300 mb-4 flex items-center">
                    <i data-lucide="settings" class="w-4 h-4 mr-2 text-blue-400"></i> 抽取参数设置
                </h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <label class="text-sm text-slate-400 font-medium">单次抽取人数</label>
                        <input type="number" id="draw-count" min="1" value="1" class="w-20 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-center text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="text-sm text-slate-400 font-medium">中奖后从名单移除</label>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="remove-winner" checked class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 文件上传区 -->
            <div id="drop-zone" class="relative border-2 border-dashed border-slate-600 bg-slate-800 hover:border-slate-500 hover:bg-slate-700 rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer transition-colors overflow-hidden">
                <div id="loading-overlay" class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-10 hidden">
                    <i data-lucide="loader-2" class="w-8 h-8 text-blue-500 animate-spin"></i>
                </div>
                <i id="drop-icon" data-lucide="upload-cloud" class="w-10 h-10 mb-3 text-slate-400 transition-colors"></i>
                <p class="text-sm font-medium text-center">点击或拖拽文件至此</p>
                <p class="text-xs text-slate-500 mt-2 text-center">支持导入 Excel (.xlsx/.xls) 或 CSV 表格</p>
                <input type="file" id="file-input" accept=".txt,.csv,.xlsx,.xls" class="hidden">
            </div>

            <!-- 手动输入区 -->
            <div class="flex flex-col flex-1 min-h-[250px] lg:min-h-0">
                <div id="sheet-selector-container" class="mb-4 bg-slate-700/30 p-3 rounded-lg border border-slate-700 hidden">
                    <label class="text-xs font-semibold text-slate-300 mb-2 flex items-center">
                        <i data-lucide="layers" class="w-4 h-4 mr-2 text-blue-400"></i> 检测到多个工作表，请勾选导入范围：
                    </label>
                    <div id="sheet-list" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto">
                        <!-- Sheets dynamically inserted here -->
                    </div>
                </div>
                
                <label class="text-sm font-medium text-slate-400 mb-2 flex justify-between items-center">
                    <span>或在此直接输入名单（换行或逗号分隔）</span>
                </label>
                <textarea id="raw-text" class="flex-1 min-h-[150px] w-full bg-slate-950 border border-slate-700 rounded-lg p-4 text-sm text-slate-300 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none" placeholder="例如：&#10;张三&#10;李四&#10;特等奖&#10;一等奖..."></textarea>
            </div>
        </div>
    </div>

    <button id="desktop-reopen-btn" class="hidden fixed left-0 top-1/2 -translate-y-1/2 z-30 w-8 h-20 bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white rounded-r-lg items-center justify-center shadow-lg" title="展开侧边栏"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>

    <!-- 主展示区 -->
    <div id="main-content" class="flex-1 flex flex-col gradient-bg relative overflow-hidden">
        <div class="flex-1 flex flex-col items-center justify-center p-4 sm:p-8 lg:p-12 relative z-10">
            
            <!-- 抽奖结果显示面板 -->
            <div class="relative w-full max-w-4xl h-64 sm:h-72 lg:h-80 mb-8 sm:mb-16 flex items-center justify-center mt-8 lg:mt-0 shrink-0 perspective-1000">
                <div id="display-glow" class="absolute -inset-4 sm:inset-0 rounded-3xl blur-2xl sm:blur-3xl transition-all duration-500 bg-slate-600 opacity-30 sm:opacity-20"></div>
                
                <div id="display-box" class="relative z-10 w-full h-full bg-slate-800/80 backdrop-blur-md border-2 border-slate-700 rounded-3xl flex items-center justify-center overflow-hidden transition-all duration-300">
                    <div id="names-container" class="p-4 sm:p-8 w-full h-full flex flex-wrap content-center justify-center gap-x-4 sm:gap-x-8 gap-y-3 sm:gap-y-6 overflow-y-auto">
                        <!-- Names dynamically inserted here -->
                        <span class="whitespace-nowrap font-bold text-center text-slate-400 tracking-wider text-xl sm:text-3xl">系统已就绪</span>
                    </div>
                </div>
            </div>

            <!-- 控制按钮组 -->
            <div class="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-6 z-10 w-full sm:w-auto px-4 sm:px-0 shrink-0">
                <button id="start-btn" class="w-full sm:w-auto flex items-center justify-center space-x-2 px-8 sm:px-12 py-4 sm:py-5 rounded-full font-bold text-lg sm:text-xl transition-all duration-300 bg-slate-700 text-slate-400 cursor-not-allowed opacity-80" disabled>
                    <i data-lucide="play" class="w-5 h-5 sm:w-6 sm:h-6 mr-2 btn-icon"></i>
                    <span id="start-btn-text">开始抽取</span>
                </button>
            </div>
        </div>
        
        <div class="p-3 sm:p-4 text-center text-slate-500 sm:text-slate-600 text-xs sm:text-sm border-t border-slate-800/50 shrink-0 z-10">
            专业抽奖系统 | 确保程序公平、公开、公正
        </div>
    </div>

    <script>
        // --- 初始化：确保 DOM 完全就绪后执行 ---
        document.addEventListener('DOMContentLoaded', () => {
        
        // --- 初始化 Lucide 图标 ---
        lucide.createIcons();
        // 二次保障：延迟再扫一遍，确保动态元素也被替换
        setTimeout(() => lucide.createIcons(), 100);

        // --- 应用状态 (State) ---
        let state = {
            candidates: [],
            rawText: '',
            isDrawing: false,
            isLoading: false,
            currentDisplay: ['系统已就绪'],
            winners: null,
            drawCount: 1,
            removeWinner: true,
            excelSheets: [],
            activeSheets: []
        };

        // --- DOM 节点获取 ---
        const els = {
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-msg'),
            candidateCount: document.getElementById('candidate-count'),
            systemStatus: document.getElementById('system-status'),
            drawCount: document.getElementById('draw-count'),
            removeWinner: document.getElementById('remove-winner'),
            dropZone: document.getElementById('drop-zone'),
            dropIcon: document.getElementById('drop-icon'),
            fileInput: document.getElementById('file-input'),
            loadingOverlay: document.getElementById('loading-overlay'),
            sheetContainer: document.getElementById('sheet-selector-container'),
            sheetList: document.getElementById('sheet-list'),
            rawText: document.getElementById('raw-text'),
            displayGlow: document.getElementById('display-glow'),
            displayBox: document.getElementById('display-box'),
            namesContainer: document.getElementById('names-container'),
            startBtn: document.getElementById('start-btn'),
            startBtnText: document.getElementById('start-btn-text'),
            startBtnIcon: document.querySelector('.btn-icon'),
            confettiCanvas: document.getElementById('confetti-canvas'),
            mobileBtn: document.getElementById('mobile-menu-btn'),
            sidebar: document.getElementById('sidebar'),
            sidebarClose: document.getElementById('close-sidebar-btn'),
            desktopCollapseBtn: document.getElementById('desktop-collapse-btn'),
            desktopReopenBtn: document.getElementById('desktop-reopen-btn'),
            mobileOverlay: document.getElementById('mobile-overlay')
        };

        let toastTimeout = null;
        let animationFrameId = null;
        let confettiFrameId = null;

        // --- 工具函数：消息提示 (Toast) ---
        const showToast = (msg) => {
            els.toastMsg.textContent = msg;
            els.toast.classList.remove('hidden', 'toast-leave');
            els.toast.classList.add('toast-enter');
            els.toast.style.pointerEvents = 'auto';
            
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                els.toast.classList.remove('toast-enter');
                els.toast.classList.add('toast-leave');
                els.toast.style.pointerEvents = 'none';
                setTimeout(() => els.toast.classList.add('hidden'), 300);
            }, 3500);
        };

        // --- 核心过滤算法：数据清洗 ---
        const extractValidName = (rawStr) => {
            if (!rawStr) return null;
            let str = String(rawStr).replace(/\s/g, ''); 
            
            // Strip trailing student ID numbers before validation
            const cleaned = str.replace(/\d+$/g, '');
            str = cleaned.length >= 1 ? cleaned : str;

            if (/^\d+$/.test(str)) return null; // Pure numbers not allowed

            if (str.length > 4 || /[()（），。：；]/.test(str)) {
                const match = str.match(/^([\u4e00-\u9fa5·•]{2,15})(?:是|因|为|走读|请假|缺勤|无需|完成|，|,|。|：|:|；|;|（|\()/);
                if (match && match[1]) {
                    str = match[1];
                }
            }

            if (str.length < 2 || str.length > 15) return null;
            if (!/^[\u4e00-\u9fa5·•]+$/.test(str)) return null;
            if (/(公司|事务所|中心|集团|合伙|省|市|区|路|街|号|代表|名单|序号|电话|地址|学院|班级|学号|法定代表人|负责人|联系人|联系电话|工商注册|机构名称|名字|姓名|列表|已缴费|未缴费)/.test(str)) return null;
            
            return str;
        };

        // --- STREAMING_CHUNK:Implementing UI Update Engine ---
        // --- UI 渲染引擎 ---
        const updateUI = () => {
            els.candidateCount.textContent = state.candidates.length;
            els.rawText.value = state.rawText;
            els.drawCount.max = Math.max(1, state.candidates.length);
            
            // 系统状态指示
            if (state.isLoading) {
                els.systemStatus.textContent = '分析中...';
                els.systemStatus.className = 'text-lg font-bold text-yellow-400';
                els.loadingOverlay.classList.remove('hidden');
            } else {
                els.systemStatus.textContent = '正常';
                els.systemStatus.className = 'text-lg font-bold text-emerald-400';
                els.loadingOverlay.classList.add('hidden');
            }

            // 抽奖按钮状态
            const canDraw = state.candidates.length > 0 && !state.isLoading;
            if (state.isDrawing) {
                els.startBtn.className = 'w-full sm:w-auto flex items-center justify-center space-x-2 px-8 sm:px-12 py-4 sm:py-5 rounded-full font-bold text-lg sm:text-xl transition-all duration-300 bg-slate-700 text-slate-400 cursor-not-allowed opacity-80';
                els.startBtn.disabled = true;
                els.startBtnText.textContent = '抽取中...';
                els.startBtnIcon.setAttribute('data-lucide', 'loader-2');
                els.startBtnIcon.classList.add('animate-spin');
            } else if (canDraw) {
                els.startBtn.className = 'w-full sm:w-auto flex items-center justify-center space-x-2 px-8 sm:px-12 py-4 sm:py-5 rounded-full font-bold text-lg sm:text-xl transition-all duration-300 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white shadow-[0_0_30px_rgba(79,70,229,0.4)] hover:shadow-[0_0_40px_rgba(79,70,229,0.6)] transform hover:-translate-y-1';
                els.startBtn.disabled = false;
                els.startBtnText.textContent = '开始抽取';
                els.startBtnIcon.setAttribute('data-lucide', 'play');
                els.startBtnIcon.classList.remove('animate-spin');
            } else {
                els.startBtn.className = 'w-full sm:w-auto flex items-center justify-center space-x-2 px-8 sm:px-12 py-4 sm:py-5 rounded-full font-bold text-lg sm:text-xl transition-all duration-300 bg-slate-700 text-slate-400 cursor-not-allowed opacity-80';
                els.startBtn.disabled = true;
                els.startBtnText.textContent = '开始抽取';
                els.startBtnIcon.setAttribute('data-lucide', 'play');
                els.startBtnIcon.classList.remove('animate-spin');
            }
            

            // 多工作表 UI
            if (state.excelSheets.length > 1) {
                els.sheetContainer.classList.remove('hidden');
                els.sheetList.innerHTML = '';
                state.excelSheets.forEach(sheet => {
                    const isActive = state.activeSheets.includes(sheet.name);
                    const label = document.createElement('label');
                    label.className = `flex items-center space-x-1 text-sm px-3 py-1.5 rounded-full cursor-pointer border transition-all duration-200 select-none ${isActive ? 'bg-blue-600/20 border-blue-500/50 text-blue-300 shadow-[0_0_10px_rgba(59,130,246,0.1)]' : 'bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500 hover:text-slate-200'}`;
                    
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.className = 'hidden';
                    input.checked = isActive;
                    input.disabled = state.isDrawing || state.isLoading;
                    input.addEventListener('change', () => handleSheetToggle(sheet.name));
                    
                    const spanName = document.createElement('span');
                    spanName.className = 'truncate max-w-[120px]';
                    spanName.title = sheet.name;
                    spanName.textContent = sheet.name;
                    
                    const spanCount = document.createElement('span');
                    spanCount.className = `text-xs ${isActive ? 'text-blue-400' : 'opacity-60'}`;
                    spanCount.textContent = `(${sheet.data.length}人)`;
                    
                    label.appendChild(input);
                    label.appendChild(spanName);
                    label.appendChild(spanCount);
                    els.sheetList.appendChild(label);
                });
            } else {
                els.sheetContainer.classList.add('hidden');
            }

            renderDisplay();
            lucide.createIcons(); // 刷新因 DOM 更改带来的新图标
        };

        const getDisplayTextSize = (textStr, isWinner, isDrawing, count) => {
            const len = String(textStr).length;
            if (count >= 10) return isWinner ? 'text-lg sm:text-2xl scale-105' : 'text-base sm:text-xl';
            if (count >= 5) return isWinner ? 'text-xl sm:text-3xl scale-105' : 'text-lg sm:text-2xl';
            if (count > 1) return isWinner ? 'text-2xl sm:text-4xl scale-105' : 'text-xl sm:text-3xl';
            if (len <= 4) return isWinner ? 'text-5xl sm:text-8xl scale-110' : isDrawing ? 'text-4xl sm:text-7xl' : 'text-4xl sm:text-6xl';
            if (len <= 8) return isWinner ? 'text-4xl sm:text-6xl scale-105' : isDrawing ? 'text-3xl sm:text-5xl' : 'text-3xl sm:text-4xl';
            if (len <= 15) return isWinner ? 'text-2xl sm:text-4xl' : isDrawing ? 'text-xl sm:text-3xl' : 'text-xl sm:text-3xl';
            return isWinner ? 'text-xl sm:text-3xl' : isDrawing ? 'text-lg sm:text-2xl' : 'text-lg sm:text-xl';
        };

        const renderDisplay = () => {
            // 背景与边框特效
            if (state.isDrawing) {
                els.displayGlow.className = 'absolute -inset-4 sm:inset-0 rounded-3xl blur-2xl sm:blur-3xl transition-all duration-500 bg-blue-600 scale-105 sm:scale-110 opacity-50 sm:opacity-20';
                els.displayBox.className = 'relative z-10 w-full h-full bg-slate-800/80 backdrop-blur-md border-2 border-blue-500/50 rounded-3xl flex items-center justify-center overflow-hidden transition-all duration-300';
            } else if (state.winners) {
                els.displayGlow.className = 'absolute -inset-4 sm:inset-0 rounded-3xl blur-2xl sm:blur-3xl transition-all duration-500 bg-yellow-500 scale-110 sm:scale-125 opacity-50 sm:opacity-40';
                els.displayBox.className = 'relative z-10 w-full h-full bg-slate-800/80 backdrop-blur-md border-2 border-yellow-500/50 shadow-[0_0_30px_rgba(234,179,8,0.3)] rounded-3xl flex items-center justify-center overflow-hidden transition-all duration-300';
            } else {
                els.displayGlow.className = 'absolute -inset-4 sm:inset-0 rounded-3xl blur-2xl sm:blur-3xl transition-all duration-500 bg-slate-600 opacity-30 sm:opacity-20';
                els.displayBox.className = 'relative z-10 w-full h-full bg-slate-800/80 backdrop-blur-md border-2 border-slate-700 rounded-3xl flex items-center justify-center overflow-hidden transition-all duration-300';
            }

            // 文字渲染
            els.namesContainer.innerHTML = '';
            state.currentDisplay.forEach(text => {
                const span = document.createElement('span');
                const sizeClass = getDisplayTextSize(text, state.winners !== null, state.isDrawing, state.drawCount);
                
                let styleClass = '';
                if (state.isDrawing) {
                    styleClass = 'text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] tracking-widest';
                } else if (state.winners) {
                    styleClass = 'text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-yellow-400 to-yellow-600 drop-shadow-[0_0_15px_rgba(234,179,8,0.5)] tracking-widest transition-all duration-500';
                } else {
                    styleClass = 'text-slate-400 tracking-wider transition-all duration-500';
                }
                
                span.className = `whitespace-nowrap font-bold text-center ${sizeClass} ${styleClass}`;
                span.textContent = text;
                els.namesContainer.appendChild(span);
            });
        };

        // --- STREAMING_CHUNK:Implementing Data Processing and Parsing Logic ---
        const parseAndSetCandidates = (text) => {
            const uniqueMap = new Map();
            text.split(/[\n,\t]+/).forEach((item) => {
                const validName = extractValidName(item);
                if (validName) {
                    let baseKey = validName.replace(/[·•]/g, '');
                    if (!uniqueMap.has(baseKey)) {
                        uniqueMap.set(baseKey, validName);
                    }
                }
            });
            state.candidates = Array.from(uniqueMap.values());
            updateUI();
        };

        const extractNamesFromSheet = (worksheet) => {
            const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            if (json.length === 0) return [];

            const numCols = json.reduce((max, row) => Math.max(max, row?.length || 0), 0);
            let bestColIndex = -1;
            let maxScore = -10000;

            const headerRow = json[0] || [];

            for (let c = 0; c < numCols; c++) {
                let score = 0;
                // Boost columns whose header contains name-related keywords
                const header = String(headerRow[c] || '').replace(/\s/g, '');
                if (/(名|姓|号|列表|人员|成员|团员|学生)/.test(header)) score += 20;
                for (let r = 0; r < Math.min(json.length, 200); r++) {
                    const cell = json[r] && json[r][c];
                    if (cell !== undefined && cell !== null) {
                        const str = String(cell).replace(/\s/g, '');
                        if (str.length === 0) continue;

                        const stripped = str.replace(/\d+$/g, '');
                        if (stripped.length >= 2 && stripped.length <= 4 && /^[一-龥·•]+$/.test(stripped)) score += 3;
                        else if (stripped.length > 4 && stripped.length <= 15 && /^[一-龥·•]+$/.test(stripped)) score += 2;
                        else if (/^[一-龥·•]+$/.test(stripped)) score += 1;

                        if (/^\d+$/.test(str)) score -= 3;
                        if (/(公司|事务所|中心|集团|合伙|省|市|区|路|街|号|代表|名单|序号|电话|地址)/.test(str)) score -= 10;
                    }
                }
                if (score > maxScore) { maxScore = score; bestColIndex = c; }
            }

            const rawExtracted = [];
            if (bestColIndex !== -1 && maxScore > 0) {
                json.forEach(row => {
                    const cell = row[bestColIndex];
                    const validName = extractValidName(cell);
                    if (validName) rawExtracted.push(validName);
                });
            }
            return rawExtracted;
        };

        const processFile = (file) => {
            if (!file) return;
            const fileExt = file.name.split('.').pop().toLowerCase();
            const allowedExts = ['txt', 'csv', 'xlsx', 'xls'];

            if (!allowedExts.includes(fileExt)) {
                showToast('格式不支持：系统仅支持导入 Excel表格 (.xlsx/.xls)、CSV文件及纯文本文件。');
                return;
            }
            
            state.isLoading = true;
            updateUI();

            if (['xlsx', 'xls', 'csv'].includes(fileExt)) {
                if (typeof XLSX === 'undefined') {
                    showToast('组件未就绪：表格解析组件正在加载中，请稍后重试。');
                    state.isLoading = false;
                    updateUI();
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        
                        const parsedSheets = [];
                        const defaultActive = [];

                        workbook.SheetNames.forEach(sheetName => {
                            const worksheet = workbook.Sheets[sheetName];
                            const names = extractNamesFromSheet(worksheet);
                            if (names.length > 0) {
                                parsedSheets.push({ name: sheetName, data: names });
                                defaultActive.push(sheetName);
                            }
                        });

                        if (parsedSheets.length === 0) {
                            showToast('数据提取失败：未能根据结构特征探测到有效的名单列，已自动阻断脏数据。');
                        } else {
                            state.excelSheets = parsedSheets;
                            state.activeSheets = defaultActive;
                            const combinedNames = parsedSheets.flatMap(s => s.data);
                            state.rawText = combinedNames.join('\n');
                            parseAndSetCandidates(state.rawText);
                            showToast(`导入成功：共探测到 ${combinedNames.length} 条有效记录。`);
                        }
                    } catch (error) {
                        console.error('解析异常:', error);
                        showToast('文件解析异常：请检查文件编码或结构完整性。');
                    } finally {
                        state.isLoading = false;
                        updateUI();
                    }
                };
                reader.readAsArrayBuffer(file);
            } else {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.excelSheets = [];
                    state.activeSheets = [];
                    state.rawText = e.target.result;
                    parseAndSetCandidates(state.rawText);
                    state.isLoading = false;
                    updateUI();
                    showToast('文本文件导入成功。');
                };
                reader.readAsText(file);
            }
        };

        const handleSheetToggle = (sheetName) => {
            if (state.activeSheets.includes(sheetName)) {
                state.activeSheets = state.activeSheets.filter(name => name !== sheetName);
            } else {
                state.activeSheets.push(sheetName);
            }

            const combinedNames = state.excelSheets
                .filter(sheet => state.activeSheets.includes(sheet.name))
                .flatMap(sheet => sheet.data);
            
            state.rawText = combinedNames.join('\n');
            parseAndSetCandidates(state.rawText);
        };

        // --- STREAMING_CHUNK:Implementing Animation and Draw Mechanics ---
        const fireConfetti = () => {
            const canvas = els.confettiCanvas;
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * 360,
                    spin: Math.random() * 0.2 - 0.1,
                });
            }

            if(confettiFrameId) cancelAnimationFrame(confettiFrameId);

            const render = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let activeParticles = 0;
                particles.forEach((p) => {
                    p.y += p.speed;
                    p.angle += p.spin;
                    if (p.y < canvas.height) activeParticles++;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                });

                if (activeParticles > 0) {
                    confettiFrameId = requestAnimationFrame(render);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            };
            render();
        };

        const startDraw = () => {
            if (state.candidates.length === 0) {
                showToast('状态检查：名单数据为空，请先导入并验证数据。'); return;
            }
            if (state.candidates.length < state.drawCount) {
                showToast(`参数冲突：抽取人数（${state.drawCount}）超过名单人数（${state.candidates.length}）。`); return;
            }
            
            const ctx = els.confettiCanvas.getContext('2d');
            ctx.clearRect(0, 0, els.confettiCanvas.width, els.confettiCanvas.height);

            state.isDrawing = true;
            state.winners = null;
            updateUI();

            const dynamicDuration = Math.min(8000, Math.max(3000, 3000 + (state.candidates.length * 40)));
            const startTime = performance.now();
            let lastUpdateTime = startTime;

            const animate = (currentTime) => {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / dynamicDuration, 1);

                if (progress >= 1) {
                    const shuffled = [...state.candidates].sort(() => 0.5 - Math.random());
                    const finalWinners = shuffled.slice(0, state.drawCount);
                    
                    state.currentDisplay = finalWinners;
                    state.winners = finalWinners;
                    state.isDrawing = false;
                    
                    fireConfetti();
                    
                    if (state.removeWinner) {
                        state.candidates = state.candidates.filter(c => !finalWinners.includes(c));
                        state.rawText = state.candidates.join('\n');
                    }
                    updateUI();
                    return;
                }

                const currentInterval = 40 + (410 * Math.pow(progress, 4));

                if (currentTime - lastUpdateTime >= currentInterval) {
                    const tempDisplay = [];
                    for (let i = 0; i < state.drawCount; i++) {
                        tempDisplay.push(state.candidates[Math.floor(Math.random() * state.candidates.length)]);
                    }
                    state.currentDisplay = tempDisplay;
                    renderDisplay(); // 只刷新展示区，避免重绘整个UI导致闪烁
                    lastUpdateTime = currentTime;
                }
                animationFrameId = requestAnimationFrame(animate);
            };
            animationFrameId = requestAnimationFrame(animate);
        };

        // --- STREAMING_CHUNK:Binding Event Listeners ---
        // 绑定拖拽和文件上传事件
        els.dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            if(!state.isLoading) {
                els.dropZone.classList.add('border-blue-500', 'bg-blue-500/10');
                els.dropIcon.classList.replace('text-slate-400', 'text-blue-500');
            }
        });
        els.dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            els.dropZone.classList.remove('border-blue-500', 'bg-blue-500/10');
            els.dropIcon.classList.replace('text-blue-500', 'text-slate-400');
        });
        els.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            els.dropZone.classList.remove('border-blue-500', 'bg-blue-500/10');
            els.dropIcon.classList.replace('text-blue-500', 'text-slate-400');
            if(!state.isLoading && e.dataTransfer.files.length > 0) {
                processFile(e.dataTransfer.files[0]);
            }
        });
        els.dropZone.addEventListener('click', () => {
            if(!state.isLoading) els.fileInput.click();
        });
        els.fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) processFile(e.target.files[0]);
            e.target.value = ''; // 允许重复上传同名文件
        });

        // 文本域与设置事件
        els.rawText.addEventListener('input', (e) => {
            state.rawText = e.target.value;
            parseAndSetCandidates(state.rawText);
        });
        els.drawCount.addEventListener('input', (e) => {
            let val = parseInt(e.target.value) || 1;
            state.drawCount = Math.min(val, state.candidates.length > 0 ? state.candidates.length : 999);
        });
        els.removeWinner.addEventListener('change', (e) => {
            state.removeWinner = e.target.checked;
        });

        // 抽奖控制事件
        els.startBtn.addEventListener('click', startDraw);

        // 移动端菜单控制
        const toggleSidebar = (show) => {
            if (show) {
                els.sidebar.classList.remove('desktop-collapsed');
                els.desktopReopenBtn.style.display='none';
                els.mobileOverlay.classList.remove('opacity-0','pointer-events-none');
                els.mobileOverlay.classList.add('opacity-100','pointer-events-auto');
            } else {
                els.sidebar.classList.add('desktop-collapsed');
                if(window.innerWidth>=1024)els.desktopReopenBtn.style.display='flex';
                els.mobileOverlay.classList.add('opacity-0','pointer-events-none');
                els.mobileOverlay.classList.remove('opacity-100','pointer-events-auto');
            }
        };
        els.mobileBtn.addEventListener('click', () => { if(els.sidebar.classList.contains('desktop-collapsed')){toggleSidebar(true)}else{toggleSidebar(false)} });
                els.desktopCollapseBtn.addEventListener('click', () => toggleSidebar(false));
        els.desktopReopenBtn.addEventListener('click', () => toggleSidebar(true));
        toggleSidebar(true);
        els.sidebarClose.addEventListener('click', () => toggleSidebar(false));
        els.mobileOverlay.addEventListener('click', () => toggleSidebar(false));

        // 窗口 Resize 重置 Canvas
        window.addEventListener('resize', () => {
            if (els.confettiCanvas.width !== window.innerWidth) {
                els.confettiCanvas.width = window.innerWidth;
                els.confettiCanvas.height = window.innerHeight;
            }
        });
        }); // DOMContentLoaded
    </script>
</body>
</html>
