<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全景工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
                    },
                    transitionProperty: { 'width': 'width', 'spacing': 'margin, padding', 'max-height': 'max-height' }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-shadow { box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15); }
        .dark .glass-shadow { box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4); }
        .clock-font { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center font-sans text-gray-800 dark:text-gray-100 overflow-hidden selection:bg-green-500 selection:text-white pt-[12vh] md:pt-[15vh]">

    <!-- ================= 1. 物理背景层 ================= -->
    <div id="bg-layer" class="fixed inset-0 z-0 bg-gradient-to-br from-[#6b7b62] to-[#8d9f82] dark:from-gray-900 dark:to-gray-800 bg-cover bg-center bg-no-repeat transition-all duration-700"></div>

    <!-- ================= 2. 专注模式全屏遮罩 ================= -->
    <div id="focus-overlay" class="fixed inset-0 z-10 bg-black/10 dark:bg-black/40 backdrop-blur-[20px] opacity-0 transition-opacity duration-500 pointer-events-none"></div>

    <!-- ================= 3. 顶层主业务架构 ================= -->
    <div class="relative z-20 w-full max-w-2xl px-5 md:px-4 flex flex-col items-center" id="main-container">
        
        <!-- 时钟模块 -->
        <div id="clock-module" class="text-center mb-6 md:mb-8 flex justify-center items-center font-medium text-white drop-shadow-md clock-font tracking-tight" style="text-shadow: 0 2px 12px rgba(0,0,0,0.15);">
            <span id="time-hours" class="text-[5rem] sm:text-[5.5rem] md:text-[7.5rem] leading-none">00</span>
            <span class="text-[4.5rem] sm:text-[5rem] md:text-[7rem] leading-none mx-0.5 md:mx-1 transform -translate-y-[8%] md:-translate-y-[6%] opacity-90">:</span>
            <span id="time-minutes" class="text-[5rem] sm:text-[5.5rem] md:text-[7.5rem] leading-none">00</span>
        </div>

        <!-- 检索中枢 -->
        <div class="relative w-full z-30" id="search-wrapper">
            <form id="search-form" class="relative group flex items-center bg-white/20 backdrop-blur-lg rounded-full h-12 md:h-14 shadow-sm transition-all duration-300 border border-white/20 w-full mx-auto">
                
                <button type="button" id="engine-selector-btn" class="w-0 opacity-0 px-0 overflow-hidden flex items-center justify-center h-full text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none transition-all duration-300 whitespace-nowrap" title="切换搜索引擎 (Alt+1~6)">
                    <span id="current-engine-icon" class="w-5 h-5 flex items-center justify-center font-bold text-base md:text-lg leading-none"></span>
                </button>

                <div id="search-divider" class="w-0 opacity-0 h-5 md:h-6 bg-gray-300 dark:bg-gray-600 transition-all duration-300"></div>

                <input type="text" id="search-input" autocomplete="off" class="flex-1 bg-transparent border-none focus:ring-0 outline-none px-4 text-white placeholder-white text-center text-[15px] md:text-base transition-all duration-300 w-full" placeholder="搜索">

                <button type="submit" id="search-submit-btn" class="w-0 opacity-0 px-0 overflow-hidden flex items-center justify-center h-full text-[#64c81a] hover:text-[#55a815] focus:outline-none transition-all duration-300">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </button>
            </form>

            <div id="engine-dropdown" class="hidden absolute top-[3.5rem] md:top-[4rem] left-0 w-48 bg-[#fcfcfc]/95 dark:bg-gray-800/95 backdrop-blur-2xl rounded-2xl shadow-xl glass-shadow border border-white/40 dark:border-gray-700 overflow-hidden z-50 transform origin-top transition-all">
                <div class="py-1 md:py-2" id="engine-list"></div>
                <div class="border-t border-gray-100 dark:border-gray-700 py-1">
                    <button type="button" onclick="openEnginePrefs()" class="w-full text-left px-5 py-2.5 text-xs md:text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-100/50 dark:hover:bg-gray-700/50 flex items-center gap-4 transition-colors">
                        <span class="w-4 h-4 text-gray-400 flex items-center justify-center"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></span> 
                        偏好设置
                    </button>
                </div>
            </div>

            <!-- 毛玻璃历史记录面板 (默认强隐藏，由渲染器接管) -->
            <div id="suggestions" class="hidden absolute top-[3.5rem] md:top-[4rem] left-0 right-0 bg-black/20 dark:bg-black/40 backdrop-blur-2xl rounded-2xl shadow-2xl glass-shadow border border-white/10 overflow-hidden z-40 flex-col">
                <div id="suggestions-content" class="py-2 max-h-52 md:max-h-60 overflow-y-auto no-scrollbar flex-1"></div>
                
                <div id="clear-history-box" class="border-t border-white/10 py-1 hidden">
                    <button type="button" onclick="clearHistory()" class="w-full text-left px-5 py-2.5 text-xs text-gray-300 hover:text-white hover:bg-white/10 flex items-center gap-2 transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        清除历史记录
                    </button>
                </div>
            </div>
        </div>

        <!-- 常用网站矩阵 -->
        <div id="links-module" class="mt-10 md:mt-12 w-full transition-opacity duration-500 ease-in-out">
            <div id="links-grid" class="grid grid-cols-4 md:grid-cols-6 gap-3 md:gap-4"></div>
        </div>
    </div>

    <!-- ================= 4. 深度毛玻璃：动态诗词模块 ================= -->
    <div id="poem-module" class="fixed bottom-20 md:bottom-28 left-1/2 transform -translate-x-1/2 w-full max-w-2xl px-5 md:px-4 z-40 opacity-0 pointer-events-none transition-opacity duration-700 ease-out">
        <div class="group relative w-full h-[88px] md:h-[104px] rounded-2xl transition-all duration-300 bg-transparent border border-transparent hover:bg-black/20 dark:hover:bg-black/40 hover:backdrop-blur-[24px] hover:border-white/20 hover:shadow-2xl flex flex-col items-center">
            
            <div class="absolute inset-x-0 top-6 md:top-8 text-center px-12 md:px-16 pointer-events-none">
                <p id="poem-text" class="text-white text-[14px] md:text-[15px] tracking-[0.1em] drop-shadow-md font-medium transition-all duration-300">「 加载中... 」</p>
            </div>
            
            <div class="absolute inset-x-0 bottom-4 md:bottom-5 text-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none">
                <p id="poem-author" class="text-white/80 text-[12px] md:text-[13px] tracking-widest drop-shadow-sm">—— ...</p>
            </div>

            <button id="poem-menu-btn" class="absolute top-3 right-3 md:top-4 md:right-4 opacity-0 group-hover:opacity-100 text-white/70 hover:text-white transition-all focus:outline-none p-1.5 rounded-lg hover:bg-white/10 z-10">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path></svg>
            </button>

            <div id="poem-menu-dropdown" class="hidden absolute top-[3.25rem] right-3 md:right-4 w-32 bg-[#fcfcfc]/95 dark:bg-gray-800/95 backdrop-blur-xl rounded-xl shadow-xl glass-shadow border border-white/40 dark:border-gray-700 overflow-hidden z-50 transform transition-all">
                <div class="py-1.5">
                    <button type="button" onclick="copyPoem(event)" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-3 transition-colors">
                        <svg class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        复制
                    </button>
                    <button type="button" onclick="searchPoem(event)" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-3 transition-colors">
                        <svg class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        搜索
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 5. 全局控件 & 偏好模态窗 ================= -->
    <!-- 优化：触控热区放大为 w-12 h-12 (48px)，剥离边框背景，采用纯水印形态，位置抬高避开底部冲突 -->
    <button id="theme-toggle-btn" class="fixed bottom-10 right-6 md:bottom-12 md:right-10 z-40 w-12 h-12 flex items-center justify-center rounded-full bg-transparent text-white/40 hover:text-white/90 hover:bg-white/10 transition-all duration-300 focus:outline-none group">
        <svg class="w-6 h-6 hidden dark:block group-hover:text-yellow-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        <svg class="w-6 h-6 block dark:hidden transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
    </button>

    <div id="prefs-modal" class="fixed inset-0 bg-black/40 backdrop-blur-md z-[60] hidden flex flex-col items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-[#fcfcfc] dark:bg-gray-800 rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden p-6 md:p-8 relative">
            <button onclick="closeEnginePrefs()" class="absolute top-5 right-5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 focus:outline-none transition-colors">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h2 class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white mb-5 md:mb-6">搜索引擎偏好</h2>
            <div id="prefs-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 max-h-[60vh] overflow-y-auto no-scrollbar pb-4"></div>
        </div>
    </div>

    <!-- ================= 核心业务逻辑 ================= -->
    <script>
        // ---------------- A. 主题与背景 ----------------
        const htmlEl = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle-btn');
        const bgLayer = document.getElementById('bg-layer');

        function initTheme() {
            const savedTheme = localStorage.getItem('dashboard_theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                htmlEl.classList.add('dark');
            } else { htmlEl.classList.remove('dark'); }
        }
        themeBtn.addEventListener('click', () => {
            htmlEl.classList.toggle('dark');
            localStorage.setItem('dashboard_theme', htmlEl.classList.contains('dark') ? 'dark' : 'light');
        });
        function initBackground() {
            const customBg = localStorage.getItem('dashboard_bg');
            if (customBg) bgLayer.style.backgroundImage = `url('${customBg}')`;
        }

        // ---------------- B. 时钟引擎 ----------------
        const hoursDisplay = document.getElementById('time-hours');
        const minsDisplay = document.getElementById('time-minutes');
        function updateClock() {
            const now = new Date();
            hoursDisplay.textContent = String(now.getHours()).padStart(2, '0');
            minsDisplay.textContent = String(now.getMinutes()).padStart(2, '0');
            const delay = 60000 - (now.getSeconds() * 1000 + now.getMilliseconds());
            setTimeout(updateClock, delay);
        }

        // ---------------- C. 首字符引擎架构 ----------------
        const DEFAULT_ENGINES = {
            baidu:  { name: '百度', hotkey: 1, url: 'https://www.baidu.com/s?wd=', char: '百' },
            bing:   { name: '必应', hotkey: 2, url: 'https://www.bing.com/search?q=', char: '必' },
            google: { name: '谷歌', hotkey: 3, url: 'https://www.google.com/search?q=', char: 'G' },
            yandex: { name: 'Yandex', hotkey: 4, url: 'https://yandex.com/search/?text=', char: 'Y' },
            sogou:  { name: '搜狗搜索', hotkey: 5, url: 'https://www.sogou.com/web?query=', char: '搜' },
            so360:  { name: '360 搜索', hotkey: 6, url: 'https://www.so.com/s?q=', char: '3' }
        };

        let ENGINES = { ...DEFAULT_ENGINES, ...JSON.parse(localStorage.getItem('dashboard_custom_engines') || '{}') };
        let currentEngineId = localStorage.getItem('dashboard_engine') || 'bing'; 
        if (!ENGINES[currentEngineId]) currentEngineId = 'bing';

        const engineBtn = document.getElementById('engine-selector-btn');
        const engineIcon = document.getElementById('current-engine-icon');
        const engineDropdown = document.getElementById('engine-dropdown');
        const engineList = document.getElementById('engine-list');
        const searchInput = document.getElementById('search-input');

        function setEngine(id) {
            if (!ENGINES[id]) id = 'bing';
            currentEngineId = id;
            engineIcon.textContent = ENGINES[id].char;
            if(isFocusMode) { searchInput.placeholder = `在 ${ENGINES[id].name} 中搜索...`; }
            localStorage.setItem('dashboard_engine', id);
            renderEngineList(); renderEnginePrefsGrid();
            engineDropdown.classList.add('hidden');
            searchInput.focus();
        }

        function renderEngineList() {
            engineList.innerHTML = '';
            Object.keys(ENGINES).forEach(id => {
                const isActive = id === currentEngineId;
                const el = document.createElement('button');
                el.type = "button";
                el.className = `w-full text-left px-5 py-2.5 text-xs md:text-sm flex justify-between items-center transition-colors ${isActive ? 'bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50'}`;
                el.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="w-5 h-5 flex items-center justify-center font-bold text-gray-500">${ENGINES[id].char}</span> 
                        <span class="${isActive ? 'font-medium' : ''}">${ENGINES[id].name}</span>
                    </div>
                    <span class="text-xs text-gray-400 tracking-widest hidden md:inline">${ENGINES[id].hotkey ? 'Alt+'+ENGINES[id].hotkey : ''}</span>
                `;
                el.onclick = (e) => { e.preventDefault(); e.stopPropagation(); setEngine(id); };
                engineList.appendChild(el);
            });
        }

        engineBtn.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            engineDropdown.classList.toggle('hidden');
        });

        // ---------------- D. 偏好管理 ----------------
        const prefsModal = document.getElementById('prefs-modal');
        const prefsGrid = document.getElementById('prefs-grid');
        function openEnginePrefs() { engineDropdown.classList.add('hidden'); renderEnginePrefsGrid(); prefsModal.classList.remove('hidden'); }
        function closeEnginePrefs() { prefsModal.classList.add('hidden'); }

        function renderEnginePrefsGrid() {
            prefsGrid.innerHTML = '';
            Object.keys(ENGINES).forEach(id => {
                const isActive = id === currentEngineId;
                const card = document.createElement('div');
                card.className = isActive 
                    ? "relative bg-[#64c81a] rounded-xl md:rounded-2xl p-3 md:p-4 flex items-center cursor-pointer shadow-md transition-transform hover:scale-[1.02]"
                    : "bg-white dark:bg-gray-700 border border-gray-100 dark:border-gray-600 rounded-xl md:rounded-2xl p-3 md:p-4 flex items-center cursor-pointer shadow-sm transition-all hover:shadow-md hover:border-gray-200 hover:scale-[1.02]";
                card.innerHTML = `
                    <div class="w-8 h-8 flex items-center justify-center font-bold text-lg md:text-xl ${isActive ? 'text-white' : 'text-gray-400'} mr-3 md:mr-4 flex-shrink-0">${ENGINES[id].char}</div>
                    <div class="flex-1 overflow-hidden pr-6">
                        <h3 class="${isActive ? 'text-white' : 'text-gray-900 dark:text-white'} font-bold text-base md:text-lg leading-tight mb-1">${ENGINES[id].name}</h3>
                        <p class="${isActive ? 'text-green-100' : 'text-gray-400'} text-[10px] md:text-xs truncate w-full">${ENGINES[id].url}</p>
                    </div>
                `;
                card.onclick = () => { setEngine(id); setTimeout(closeEnginePrefs, 150); };
                prefsGrid.appendChild(card);
            });
        }

        // ---------------- E. 状态机与诗文 API ----------------
        const searchForm = document.getElementById('search-form');
        const searchDivider = document.getElementById('search-divider');
        const searchSubmitBtn = document.getElementById('search-submit-btn');
        const searchWrapper = document.getElementById('search-wrapper');
        const suggestionsBox = document.getElementById('suggestions');
        const linksModule = document.getElementById('links-module');
        const poemModule = document.getElementById('poem-module');
        const focusOverlay = document.getElementById('focus-overlay');
        const poemMenuBtn = document.getElementById('poem-menu-btn');
        const poemMenuDropdown = document.getElementById('poem-menu-dropdown');
        
        let isFocusMode = false; let poemFetched = false;

        async function fetchHitokoto() {
            if (poemFetched) return;
            try {
                const res = await fetch('https://v1.hitokoto.cn?c=i');
                const data = await res.json();
                document.getElementById('poem-text').textContent = `「 ${data.hitokoto} 」`;
                document.getElementById('poem-author').textContent = `—— ${data.from}`;
                poemFetched = true;
            } catch (e) {
                document.getElementById('poem-text').textContent = `「 闻君有两意，故来相决绝。 」`;
                document.getElementById('poem-author').textContent = `—— 白头吟`;
            }
        }

        function toggleFocusMode(enable) {
            if (isFocusMode === enable) return;
            isFocusMode = enable;

            if (enable) {
                focusOverlay.classList.remove('opacity-0', 'pointer-events-none');
                focusOverlay.classList.add('opacity-100', 'pointer-events-auto');
                
                searchForm.classList.remove('bg-white/20', 'border-white/20');
                searchForm.classList.add('bg-[#f8f9fa]', 'dark:bg-gray-800', 'border-transparent');
                
                searchInput.classList.remove('text-center', 'text-white', 'placeholder-white');
                searchInput.classList.add('text-left', 'text-gray-900', 'dark:text-gray-100', 'placeholder-gray-400');
                searchInput.placeholder = `在 ${ENGINES[currentEngineId].name} 中搜索...`;
                
                engineBtn.classList.remove('w-0', 'opacity-0', 'px-0');
                engineBtn.classList.add('w-10', 'md:w-12', 'opacity-100', 'px-2', 'md:px-3');
                searchDivider.classList.remove('w-0', 'opacity-0');
                searchDivider.classList.add('w-px', 'opacity-100');
                searchSubmitBtn.classList.remove('w-0', 'opacity-0', 'px-0');
                searchSubmitBtn.classList.add('w-10', 'md:w-12', 'opacity-100', 'px-2', 'md:px-3');

                linksModule.classList.add('opacity-0', 'pointer-events-none');
                poemModule.classList.remove('opacity-0', 'pointer-events-none');
                
                fetchHitokoto();
                renderSuggestions();
            } else {
                focusOverlay.classList.add('opacity-0', 'pointer-events-none');
                focusOverlay.classList.remove('opacity-100', 'pointer-events-auto');
                
                searchForm.classList.add('bg-white/20', 'border-white/20');
                searchForm.classList.remove('bg-[#f8f9fa]', 'dark:bg-gray-800', 'border-transparent');
                
                searchInput.classList.add('text-center', 'text-white', 'placeholder-white');
                searchInput.classList.remove('text-left', 'text-gray-900', 'dark:text-gray-100', 'placeholder-gray-400');
                searchInput.placeholder = "搜索";
                
                engineBtn.classList.add('w-0', 'opacity-0', 'px-0');
                engineBtn.classList.remove('w-10', 'md:w-12', 'opacity-100', 'px-2', 'md:px-3');
                searchDivider.classList.add('w-0', 'opacity-0');
                searchDivider.classList.remove('w-px', 'opacity-100');
                searchSubmitBtn.classList.add('w-0', 'opacity-0', 'px-0');
                searchSubmitBtn.classList.remove('w-10', 'md:w-12', 'opacity-100', 'px-2', 'md:px-3');

                engineDropdown.classList.add('hidden');
                poemMenuDropdown.classList.add('hidden');
                suggestionsBox.classList.add('hidden');
                linksModule.classList.remove('opacity-0', 'pointer-events-none');
                poemModule.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        poemMenuBtn.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            poemMenuDropdown.classList.toggle('hidden');
        });

        function copyPoem(e) {
            e.preventDefault(); e.stopPropagation();
            const text = document.getElementById('poem-text').textContent.replace(/[「」\s]/g, '');
            navigator.clipboard.writeText(text).catch(() => {
                const input = document.createElement('input'); input.value = text;
                document.body.appendChild(input); input.select(); document.execCommand('copy'); document.body.removeChild(input);
            });
            poemMenuDropdown.classList.add('hidden');
        }

        function searchPoem(e) {
            e.preventDefault(); e.stopPropagation();
            const text = document.getElementById('poem-text').textContent.replace(/[「」\s]/g, '');
            window.open(ENGINES[currentEngineId].url + encodeURIComponent(text), '_blank');
            poemMenuDropdown.classList.add('hidden');
        }

        document.addEventListener('click', (e) => {
            if (prefsModal.contains(e.target)) return;
            if (!poemMenuBtn.contains(e.target) && !poemMenuDropdown.contains(e.target)) { poemMenuDropdown.classList.add('hidden'); }
            if (searchWrapper.contains(e.target) || poemModule.contains(e.target)) { toggleFocusMode(true); } 
            else { toggleFocusMode(false); engineDropdown.classList.add('hidden'); }
        });

        document.addEventListener('keydown', (e) => {
            if (e.altKey && e.key >= '1' && e.key <= '9') {
                const hotkeyMap = Object.values(ENGINES);
                const targetEngine = hotkeyMap.find(en => en.hotkey === parseInt(e.key));
                if (targetEngine) {
                    e.preventDefault();
                    const engineId = Object.keys(ENGINES).find(k => ENGINES[k] === targetEngine);
                    setEngine(engineId);
                }
            }
        });

        // ---------------- F. 历史记录系统 ----------------
        const suggestionsContent = document.getElementById('suggestions-content');
        const clearHistoryBox = document.getElementById('clear-history-box');

        function getHistory() { return JSON.parse(localStorage.getItem('dashboard_history') || '[]'); }
        function saveHistory(query) {
            let hist = getHistory();
            hist = hist.filter(h => h !== query);
            hist.unshift(query);
            hist = hist.slice(0, 6);
            localStorage.setItem('dashboard_history', JSON.stringify(hist));
        }
        function clearHistory() {
            localStorage.removeItem('dashboard_history');
            renderSuggestions();
            searchInput.focus();
        }

        searchInput.addEventListener('input', () => renderSuggestions());

        function renderSuggestions() {
            const query = searchInput.value.trim().toLowerCase();
            let hist = getHistory();
            if (query) hist = hist.filter(h => h.toLowerCase().includes(query));

            suggestionsContent.innerHTML = '';
            // 修复逻辑：实时判定数组长度决定容器是否渲染
            if (hist.length > 0) {
                suggestionsBox.classList.remove('hidden');
                suggestionsBox.classList.add('flex');
                clearHistoryBox.classList.remove('hidden');
                hist.forEach(item => {
                    const el = document.createElement('div');
                    el.className = "px-5 py-2.5 hover:bg-white/10 cursor-pointer flex items-center transition-colors text-[13px] md:text-sm text-white/90";
                    el.textContent = item;
                    el.onclick = (e) => { e.stopPropagation(); doSearch(item); };
                    suggestionsContent.appendChild(el);
                });
            } else {
                suggestionsBox.classList.add('hidden');
                suggestionsBox.classList.remove('flex');
                clearHistoryBox.classList.add('hidden');
            }
        }

        function doSearch(query) {
            if (!query) return;
            saveHistory(query);
            window.open(ENGINES[currentEngineId].url + encodeURIComponent(query), '_blank');
        }

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            doSearch(searchInput.value.trim());
        });

        // ---------------- G. 常用网站矩阵数据初始化 ----------------
        const DEFAULT_LINKS = [
            { id: 1, name: 'GitHub', url: 'https://github.com' },
            { id: 2, name: 'Bilibili', url: 'https://bilibili.com' },
            { id: 3, name: 'V2EX', url: 'https://v2ex.com' }
        ];

        function getLinks() {
            const raw = localStorage.getItem('dashboard_custom_links');
            return raw ? JSON.parse(raw) : DEFAULT_LINKS;
        }

        function saveLinks(links) {
            localStorage.setItem('dashboard_custom_links', JSON.stringify(links));
            renderLinks();
        }

        function renderLinks() {
            const grid = document.getElementById('links-grid');
            grid.innerHTML = '';
            const links = getLinks();

            links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = '_blank';
                a.className = "group relative flex flex-col items-center justify-center p-2 md:p-3 bg-white/10 backdrop-blur-md rounded-xl md:rounded-2xl border border-white/20 hover:bg-white/20 transition-all duration-300 focus:outline-none";
                
                const delBtn = document.createElement('button');
                delBtn.className = "absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-sm hover:scale-110";
                delBtn.innerHTML = '<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
                delBtn.onclick = (e) => {
                    e.preventDefault(); e.stopPropagation();
                    if(confirm(`确定删除导航 [${link.name}] 吗？`)) { saveLinks(links.filter(l => l.id !== link.id)); }
                };

                const initial = link.name ? link.name.charAt(0).toUpperCase() : '?';
                a.innerHTML = `
                    <div class="w-10 h-10 md:w-11 md:h-11 flex items-center justify-center bg-white/20 text-white rounded-full text-lg font-bold mb-2 shadow-inner">
                        ${initial}
                    </div>
                    <span class="text-[10px] md:text-xs font-medium text-white text-center w-full truncate px-1">${link.name}</span>
                `;
                a.appendChild(delBtn);
                grid.appendChild(a);
            });
        }

        // ---------------- H. 系统调度 ----------------
        initTheme(); initBackground(); setEngine(currentEngineId); updateClock(); renderLinks();
    </script>
</body>
</html>
