<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专业 GIF 序列编辑器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/gif-frames@1.0.1/dist/gif-frames.min.js"></script>
    <script src="https://unpkg.com/gif.js@0.2.0/dist/gif.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        #drop-overlay { display: none; backdrop-filter: blur(4px); z-index: 999; }
        body.drag-active #drop-overlay { display: flex; }

        .checkerboard-bg {
            background-color: #f0f0f0;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #ccc 75%), 
                              linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 16px 16px; background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
        }
        .sortable-ghost { opacity: 0.4; border: 2px dashed #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden text-slate-800">

    <div id="drop-overlay" class="fixed inset-0 bg-blue-50 bg-opacity-90 flex items-center justify-center border-4 border-blue-500 border-dashed m-4 rounded-xl transition-all">
        <div class="text-center text-blue-700">
            <i data-lucide="upload-cloud" class="w-20 h-20 mx-auto mb-4"></i>
            <h2 class="text-2xl font-semibold">松开鼠标，导入文件</h2>
            <p class="mt-2">支持 GIF 或 静态图片</p>
        </div>
    </div>

    <header class="bg-white border-b border-gray-200 px-4 lg:px-6 py-3 flex justify-between items-center shadow-sm shrink-0">
        <div class="flex items-center gap-2">
            <i data-lucide="clapperboard" class="w-5 h-5 lg:w-6 lg:h-6 text-indigo-600"></i>
            <h1 class="text-base lg:text-lg font-bold text-slate-700">GIF 序列编辑器</h1>
        </div>
        <div class="flex items-center gap-2 lg:gap-3">
            <button onclick="document.getElementById('file-import-gif').click()" class="flex items-center gap-1.5 px-3 py-1.5 text-xs lg:text-sm bg-white border border-gray-300 rounded hover:bg-gray-50">
                <i data-lucide="folder-open" class="w-4 h-4"></i> <span class="hidden sm:inline">导入 GIF</span>
            </button>
            <input type="file" id="file-import-gif" accept="image/gif" class="hidden" onchange="handleFileSelect(event, 'gif')">
            
            <button onclick="document.getElementById('file-import-img').click()" class="flex items-center gap-1.5 px-3 py-1.5 text-xs lg:text-sm bg-white border border-gray-300 rounded hover:bg-gray-50">
                <i data-lucide="image-plus" class="w-4 h-4"></i> <span class="hidden sm:inline">导入静态图</span>
            </button>
            <input type="file" id="file-import-img" accept="image/png, image/jpeg, image/webp" class="hidden" onchange="handleFileSelect(event, 'image')" multiple>

            <div class="w-px h-6 bg-gray-300 mx-1"></div>

            <button onclick="exportGIF()" id="btn-export" class="flex items-center gap-1.5 px-4 py-1.5 text-xs lg:text-sm bg-indigo-600 text-white font-medium rounded hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                <i data-lucide="download" class="w-4 h-4"></i> <span>导出</span>
            </button>
        </div>
    </header>

    <div id="toast-container" class="fixed top-16 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <main class="flex-1 flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden bg-gray-50 w-full relative">
        
        <section class="w-full lg:w-80 xl:w-96 flex-shrink-0 border-b lg:border-b-0 lg:border-r border-gray-200 bg-gray-100 flex flex-col min-h-[350px] lg:min-h-0 relative z-10">
            <div class="p-3 lg:p-4 bg-white border-b border-gray-200 flex justify-between items-center shrink-0">
                <h2 class="text-sm font-semibold flex items-center gap-2"><i data-lucide="monitor-play" class="w-4 h-4"></i> 预览</h2>
                <div class="flex items-center gap-2">
                    <span id="preview-info" class="text-xs text-gray-500 font-mono">-- x -- px</span>
                    <button onclick="openGlobalResizeModal()" id="btn-resize" class="text-indigo-600 hover:bg-indigo-50 p-1 rounded transition-colors disabled:opacity-30" title="调整全局尺寸与位置" disabled>
                        <i data-lucide="crop" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 p-4 flex items-center justify-center overflow-auto checkerboard-bg relative">
                <canvas id="preview-canvas" class="max-w-full max-h-full shadow bg-white rounded"></canvas>
                <div id="preview-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
                    <i data-lucide="film" class="w-10 h-10 mb-2 opacity-50"></i>
                    <p class="text-xs">暂无数据</p>
                </div>
            </div>
            <div class="p-3 lg:p-4 bg-white border-t border-gray-200 shrink-0">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium text-gray-600">控制面板</span>
                    <button onclick="togglePlayback()" id="btn-playback" class="w-7 h-7 flex items-center justify-center bg-gray-100 rounded-full hover:bg-gray-200 disabled:opacity-50" disabled>
                        <i data-lucide="pause" class="w-3.5 h-3.5 text-gray-700"></i>
                    </button>
                </div>
                <div class="flex items-center gap-2">
                    <input type="number" id="global-delay" placeholder="延迟(ms)" class="w-full text-xs border border-gray-300 rounded px-2 py-1.5 focus:outline-none">
                    <button onclick="applyGlobalDelay()" class="whitespace-nowrap px-3 py-1.5 text-xs bg-gray-200 hover:bg-gray-300 rounded">应用</button>
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col min-w-0 bg-white min-h-[400px] lg:min-h-0 relative z-10 border-b lg:border-b-0 border-gray-200">
            <div class="p-3 lg:p-4 border-b border-gray-200 flex justify-between items-center shrink-0">
                <h2 class="text-sm font-semibold flex items-center gap-2"><i data-lucide="layers" class="w-4 h-4"></i> 序列视图</h2>
                <span class="text-xs text-gray-500">共 <span id="frame-count" class="font-bold text-slate-700">0</span> 帧 (长按排序)</span>
            </div>
            <div class="flex-1 overflow-y-auto p-3 lg:p-4 bg-gray-50">
                <ul id="frame-list" class="grid grid-cols-[repeat(auto-fill,minmax(110px,1fr))] gap-3 lg:gap-4 content-start min-h-[100px]"></ul>
            </div>
        </section>

        <section class="w-full lg:w-64 xl:w-72 flex-shrink-0 bg-white border-l border-gray-200 flex flex-col min-h-[300px] lg:min-h-0 relative z-10" id="material-zone">
            <div class="p-3 lg:p-4 border-b border-gray-200 flex justify-between items-center shrink-0 bg-gray-50">
                <h2 class="text-sm font-semibold flex items-center gap-2"><i data-lucide="library" class="w-4 h-4"></i> 素材库</h2>
            </div>
            <div class="p-2 text-[10px] text-gray-500 text-center border-b border-gray-100">
                拖入外部图片，或将素材拖入序列
            </div>
            <div class="flex-1 overflow-y-auto p-3 lg:p-4 bg-gray-50">
                <ul id="material-list" class="grid grid-cols-[repeat(auto-fill,minmax(90px,1fr))] gap-3 content-start min-h-[100px]"></ul>
            </div>
        </section>
    </main>

    <div id="global-resize-modal" class="hidden fixed inset-0 z-[120] bg-slate-900 bg-opacity-80 flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-white rounded-xl shadow-2xl flex flex-col w-full max-w-3xl h-[85vh] overflow-hidden">
            <div class="px-5 py-3 border-b border-gray-200 flex justify-between items-center bg-gray-50 shrink-0">
                <h3 class="text-base font-bold text-slate-800 flex items-center gap-2"><i data-lucide="crop" class="w-4 h-4"></i> 全局尺寸与定位</h3>
                <button onclick="closeGlobalResizeModal()" class="text-gray-500 hover:text-red-500"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
                <div class="flex-1 relative bg-gray-300 checkerboard-bg flex items-center justify-center overflow-hidden" id="gr-viewport">
                    <div id="gr-canvas-container" class="relative shadow-md origin-center touch-none">
                        <canvas id="gr-canvas" class="block w-full h-full"></canvas>
                        <canvas id="gr-overlay-canvas" class="absolute inset-0 z-10 w-full h-full cursor-crosshair"></canvas>
                    </div>
                </div>
                <div class="w-full lg:w-64 bg-white border-l border-gray-200 flex flex-col shrink-0 overflow-y-auto">
                    <div class="p-4 flex flex-col gap-4">
                        <div class="text-xs text-gray-500 bg-blue-50 text-blue-700 p-2 rounded">
                            提示：直接在左侧画布框选区域，或输入精确数值。首帧画面仅作参考。
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">新宽度(px)</label>
                                <input type="number" id="gr-w" class="w-full text-sm border rounded px-2 py-1 outline-none text-center">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">新高度(px)</label>
                                <input type="number" id="gr-h" class="w-full text-sm border rounded px-2 py-1 outline-none text-center">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-500 mb-1">内容缩放算法</label>
                            <select id="gr-mode" class="w-full text-xs border rounded px-2 py-1.5 outline-none bg-white">
                                <option value="crop">直接裁切 (保留框内像素)</option>
                                <option value="stretch">强制拉伸 (无视比例填满新框)</option>
                                <option value="contain">等比缩放 (留边填满新框)</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-auto p-4 border-t border-gray-100 flex gap-2">
                        <button onclick="closeGlobalResizeModal()" class="flex-1 py-2 text-xs border rounded hover:bg-gray-50">取消</button>
                        <button onclick="applyGlobalResize()" class="flex-1 py-2 text-xs bg-indigo-600 text-white rounded hover:bg-indigo-700">应用全局</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 z-[100] bg-slate-900 bg-opacity-80 flex items-center justify-center backdrop-blur-sm p-2 lg:p-6">
        <div class="bg-white rounded-xl shadow-2xl flex flex-col w-full max-w-5xl h-[90vh] lg:h-full overflow-hidden">
            <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center bg-gray-50 shrink-0">
                <div class="flex items-center gap-3">
                    <h3 class="text-sm lg:text-base font-bold text-slate-800 flex items-center gap-2"><i data-lucide="pen-tool" class="w-4 h-4"></i> 帧编辑</h3>
                </div>
                <div class="flex items-center gap-3 lg:gap-4">
                    <button onclick="undoEdit()" id="btn-undo-edit" class="text-gray-500 hover:text-indigo-600 disabled:opacity-30" title="撤销"><i data-lucide="undo-2" class="w-4 h-4 lg:w-5 lg:h-5"></i></button>
                    <button onclick="resetEditScale()" class="text-gray-500 hover:text-indigo-600" title="自适应视图"><i data-lucide="scaling" class="w-4 h-4 lg:w-5 lg:h-5"></i></button>
                    <button onclick="closeEditModal()" class="text-gray-400 hover:text-red-500"><i data-lucide="x" class="w-5 h-5 lg:w-6 lg:h-6"></i></button>
                </div>
            </div>
            
            <div class="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
                <div class="lg:w-16 flex lg:flex-col items-center p-2 lg:py-4 gap-2 lg:gap-4 bg-gray-100 border-b lg:border-b-0 lg:border-r border-gray-200 shrink-0 overflow-x-auto lg:overflow-x-hidden lg:overflow-y-auto z-20">
                    
                    <div class="flex lg:flex-col gap-1 w-full justify-center">
                        <button onclick="setEditTool('draw')" id="tool-draw" class="p-2 rounded bg-indigo-100 text-indigo-600" title="画笔"><i data-lucide="pen-tool" class="w-4 h-4"></i></button>
                        <button onclick="setEditTool('move')" id="tool-move" class="p-2 rounded text-gray-600 hover:bg-indigo-50" title="移动图层(防裁边)"><i data-lucide="move" class="w-4 h-4"></i></button>
                        <button onclick="setEditTool('pan')" id="tool-pan" class="p-2 rounded text-gray-600 hover:bg-indigo-50" title="抓手视图"><i data-lucide="hand" class="w-4 h-4"></i></button>
                        <button onclick="setEditTool('crop')" id="tool-crop" class="p-2 rounded text-gray-600 hover:bg-indigo-50" title="框选裁切"><i data-lucide="crop" class="w-4 h-4"></i></button>
                    </div>

                    <div class="w-px lg:w-full h-6 lg:h-px bg-gray-300 my-1 lg:my-2"></div>

                    <div class="flex lg:flex-col items-center gap-2">
                        <input type="color" id="brush-color" value="#ef4444" class="w-6 h-6 lg:w-8 lg:h-8 rounded cursor-pointer border-0 p-0">
                        <input type="range" id="brush-size" min="1" max="20" value="5" class="w-16 lg:-rotate-90 lg:mt-6" style="transform-origin: center;">
                    </div>
                </div>
                
                <div id="edit-viewport" class="flex-1 bg-gray-300 flex items-center justify-center p-2 lg:p-6 overflow-hidden relative touch-none">
                    <div id="edit-transform-container" class="relative origin-center" style="transform: scale(1); line-height:0;">
                        <div id="edit-bounds" class="relative checkerboard-bg shadow-lg border border-gray-400 overflow-visible" style="box-sizing: content-box;">
                            <canvas id="edit-canvas" class="absolute pointer-events-none"></canvas>
                        </div>
                        <canvas id="edit-interaction-layer" class="absolute inset-0 z-20 cursor-crosshair"></canvas>
                    </div>
                </div>
            </div>

            <div class="px-4 py-3 border-t border-gray-200 flex justify-end gap-2 bg-gray-50 shrink-0">
                <button onclick="closeEditModal()" class="px-4 py-1.5 text-xs lg:text-sm text-gray-700 bg-white border border-gray-300 rounded hover:bg-gray-50">取消</button>
                <button onclick="saveEditAndApply()" class="px-4 py-1.5 text-xs lg:text-sm text-white bg-indigo-600 rounded hover:bg-indigo-700 shadow-sm">保存并覆盖当前帧</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 核心全局数据
        const state = {
            frames: [], 
            materials: [], 
            width: 0, height: 0, // 全局 GIF 约束尺寸
            isPlaying: true,
            workerBlobUrl: null
        };

        const dom = {
            frameList: document.getElementById('frame-list'),
            materialList: document.getElementById('material-list'),
            materialZone: document.getElementById('material-zone'),
            btnExport: document.getElementById('btn-export'),
            btnPlayback: document.getElementById('btn-playback'),
            btnResize: document.getElementById('btn-resize'),
            frameCount: document.getElementById('frame-count'),
            previewInfo: document.getElementById('preview-info'),
            previewCanvas: document.getElementById('preview-canvas'),
            placeholder: document.getElementById('preview-placeholder'),
            
            // Edit Modal
            editModal: document.getElementById('edit-modal'),
            editViewport: document.getElementById('edit-viewport'),
            editTransform: document.getElementById('edit-transform-container'),
            editBounds: document.getElementById('edit-bounds'),
            editCanvas: document.getElementById('edit-canvas'), // 虚拟无限大图层
            editInteraction: document.getElementById('edit-interaction-layer'), // 交互截获层
            brushColor: document.getElementById('brush-color'),
            brushSize: document.getElementById('brush-size'),
            btnUndo: document.getElementById('btn-undo-edit'),

            // Global Resize Modal
            grModal: document.getElementById('global-resize-modal'),
            grViewport: document.getElementById('gr-viewport'),
            grContainer: document.getElementById('gr-canvas-container'),
            grCanvas: document.getElementById('gr-canvas'),
            grOverlay: document.getElementById('gr-overlay-canvas'),
            grW: document.getElementById('gr-w'),
            grH: document.getElementById('gr-h'),
            grMode: document.getElementById('gr-mode'),
            btnLockRatio: document.getElementById('btn-lock-ratio'),
            iconLock: document.getElementById('icon-lock')
        };

        const previewCtx = dom.previewCanvas.getContext('2d');
        let previewTimer = null;
        let currentFrameIdx = 0;

        // 提示系统
        function showToast(msg, type='info') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `px-4 py-2 rounded shadow-lg text-white text-xs lg:text-sm font-medium transition-all duration-300 opacity-0 transform -translate-y-2 ${type==='error'?'bg-red-600':type==='success'?'bg-emerald-600':'bg-blue-600'}`;
            el.textContent = msg;
            container.appendChild(el);
            requestAnimationFrame(() => el.classList.remove('opacity-0', '-translate-y-2'));
            setTimeout(() => {
                el.classList.add('opacity-0', '-translate-y-2');
                setTimeout(() => el.remove(), 300);
            }, 2500);
        }

        // 初始化
        (async function init() {
            try {
                const res = await fetch('https://unpkg.com/gif.js@0.2.0/dist/gif.worker.js');
                if(!res.ok) throw new Error();
                const text = await res.text();
                state.workerBlobUrl = URL.createObjectURL(new Blob([text], {type: 'application/javascript'}));
            } catch(e) { showToast('本地Worker初始化失败，导出可能缓慢', 'error'); }

            new Sortable(dom.frameList, {
                group: { name: 'shared', pull: true, put: true },
                animation: 150, delay: 100, delayOnTouchOnly: true, // 移动端防误触
                onAdd: (evt) => {
                    const mat = state.materials.find(m => m.id === evt.item.dataset.id);
                    if(evt.item.parentNode) evt.item.parentNode.removeChild(evt.item);
                    if(mat) {
                        const c = document.createElement('canvas'); c.width = mat.canvas.width; c.height = mat.canvas.height;
                        c.getContext('2d').drawImage(mat.canvas, 0,0);
                        state.frames.splice(evt.newIndex, 0, {id:`f_${Date.now()}`, canvas:c, delay:100});
                        syncState(); showToast('已插入', 'success');
                    }
                },
                onEnd: (evt) => {
                    if(evt.from === evt.to) {
                        const el = state.frames.splice(evt.oldIndex, 1)[0];
                        state.frames.splice(evt.newIndex, 0, el);
                    }
                    syncState();
                }
            });

            new Sortable(dom.materialList, {
                group: { name: 'shared', pull: true, put: true },
                animation: 150, delay: 100, delayOnTouchOnly: true,
                onAdd: (evt) => {
                    const f = state.frames.find(f => f.id === evt.item.dataset.id);
                    if(evt.item.parentNode) evt.item.parentNode.removeChild(evt.item);
                    if(f) {
                        createMaterialFromCanvas(f.canvas); showToast('已提取', 'success');
                    }
                },
                onEnd: () => renderMaterialList()
            });
        })();

        // 文件导入逻辑
        function handleFileSelect(e, type) {
            const files = Array.from(e.target.files);
            if(!files.length) return;
            if(type === 'gif') processGif(files[0]);
            else processImages(files);
            e.target.value = '';
        }

        async function processGif(file) {
            showToast('解析中...', 'info');
            const url = URL.createObjectURL(file);
            try {
                const data = await gifFrames({ url, frames: 'all', outputType: 'canvas', cumulative: true });
                state.frames = data.map((f, i) => ({ id:`f_${Date.now()}_${i}`, canvas:f.getImage(), delay: f.frameInfo.delay*10 || 100 }));
                if(state.frames.length) {
                    state.width = state.frames[0].canvas.width; state.height = state.frames[0].canvas.height;
                    syncState(); showToast('GIF 加载成功', 'success');
                }
            } catch(e) { showToast('解析失败', 'error'); }
            URL.revokeObjectURL(url);
        }

        async function processImages(files) {
            showToast('处理中...', 'info');
            for(let file of files) {
                await new Promise(res => {
                    const img = new Image(); const url = URL.createObjectURL(file);
                    img.onload = () => {
                        if(state.width === 0) { state.width = img.width; state.height = img.height; }
                        const cvs = document.createElement('canvas'); cvs.width = state.width; cvs.height = state.height;
                        const ctx = cvs.getContext('2d');
                        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,state.width,state.height);
                        // 等比缩放 (contain)
                        const r = Math.min(state.width/img.width, state.height/img.height);
                        const dw = img.width*r, dh = img.height*r;
                        ctx.drawImage(img, (state.width-dw)/2, (state.height-dh)/2, dw, dh);
                        state.frames.push({ id:`f_${Date.now()}_${Math.random()}`, canvas:cvs, delay:100 });
                        URL.revokeObjectURL(url); res();
                    };
                    img.onerror = res; img.src = url;
                });
            }
            syncState(); showToast('加载完毕', 'success');
        }

        // 状态同步更新
        function syncState() {
            const has = state.frames.length > 0;
            dom.placeholder.style.display = has ? 'none' : 'flex';
            dom.btnExport.disabled = !has; dom.btnPlayback.disabled = !has; dom.btnResize.disabled = !has;
            dom.frameCount.textContent = state.frames.length;
            
            if(has) {
                dom.previewInfo.textContent = `${state.width} x ${state.height} px`;
                if(dom.previewCanvas.width !== state.width) dom.previewCanvas.width = state.width;
                if(dom.previewCanvas.height !== state.height) dom.previewCanvas.height = state.height;
            } else {
                dom.previewInfo.textContent = '-- x -- px'; state.width = 0; state.height = 0;
            }
            
            // 渲染序列列表
            dom.frameList.innerHTML = '';
            state.frames.forEach((f, i) => {
                const li = document.createElement('li'); li.className='relative group bg-white border border-gray-200 rounded overflow-hidden shadow-sm flex flex-col'; li.dataset.id = f.id;
                const top = document.createElement('div'); top.className='relative h-20 checkerboard-bg border-b border-gray-100 flex-shrink-0';
                const cvs = document.createElement('canvas'); cvs.className='absolute inset-0 w-full h-full object-contain p-1 pointer-events-none';

        function deleteFrame(i) {

        function applyGlobalDelay() {

        // 播放控制
        function togglePlayback() {

        function drawSingleFrame(i) {
            if(!state.frames.length) return;

            previewCtx.drawImage(state.frames[i].canvas,0,0);
        }
        function startPreview() {
            stopPreview();
            if(!state.frames.length || !state.isPlaying) return;
            const loop = () => {
                if(!state.frames.length) return;
                currentFrameIdx = currentFrameIdx % state.frames.length;
                drawSingleFrame(currentFrameIdx);
                previewTimer = setTimeout(() => { currentFrameIdx++; loop(); }, state.frames[currentFrameIdx].delay);
            };
            loop();
        }
        function stopPreview() { if(previewTimer){ clearTimeout(previewTimer); previewTimer=null; } }

        // ================= 1. 全局尺寸可视化裁切与调整 =================
        let grScale = 1;
        let grCropRect = {x:0, y:0, w:0, h:0};
        let grIsDrawing = false;
        let grDragState = null;
        let grStartX=0, grStartY=0, grStartRect=null;

        function openGlobalResizeModal() {
            if(!state.frames.length) return;

            dom.grModal.classList.remove('hidden');

            dom.grW.value = state.width; dom.grH.value = state.height;
            dom.grCanvas.width = state.width; dom.grCanvas.height = state.height;
            dom.grCanvas.getContext('2d').drawImage(state.frames[0].canvas, 0, 0);
            
            const pw = Math.max(10, dom.grViewport.clientWidth - 40);
            const ph = Math.max(10, dom.grViewport.clientHeight - 40);
            grScale = Math.max(0.01, Math.min(pw/state.width, ph/state.height, 1));
            
            dom.grContainer.style.width = state.width + 'px';
            dom.grContainer.style.height = state.height + 'px';
            dom.grContainer.style.transform = `scale(${grScale})`;

            dom.grOverlay.width = state.width; dom.grOverlay.height = state.height;
            grCropRect = {x:0, y:0, w: state.width, h: state.height}; 
            drawGrOverlay();
        }

        function closeGlobalResizeModal() { dom.grModal.classList.add('hidden'); }

        dom.grW.addEventListener('change', () => { grCropRect.w = Math.max(10, parseInt(dom.grW.value)||10); drawGrOverlay(); });
        dom.grH.addEventListener('change', () => { grCropRect.h = Math.max(10, parseInt(dom.grH.value)||10); drawGrOverlay(); });

        function drawGrOverlay() {
            const ctx = dom.grOverlay.getContext('2d');
            ctx.clearRect(0,0, dom.grOverlay.width, dom.grOverlay.height);
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0, dom.grOverlay.width, dom.grOverlay.height);
            
            if(grCropRect.w > 0 && grCropRect.h > 0) {
                ctx.clearRect(grCropRect.x, grCropRect.y, grCropRect.w, grCropRect.h);
                ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2/grScale; ctx.strokeRect(grCropRect.x, grCropRect.y, grCropRect.w, grCropRect.h);
                
                ctx.fillStyle = '#fff'; const size = 10/grScale;
                const handles = [
                    {x: grCropRect.x, y: grCropRect.y}, {x: grCropRect.x+grCropRect.w, y: grCropRect.y},
                    {x: grCropRect.x, y: grCropRect.y+grCropRect.h}, {x: grCropRect.x+grCropRect.w, y: grCropRect.y+grCropRect.h}
                ];
                handles.forEach(h => { ctx.fillRect(h.x-size/2, h.y-size/2, size, size); ctx.strokeRect(h.x-size/2, h.y-size/2, size, size); });
            }
        }

        function getGrMousePos(e) {
            const rect = dom.grOverlay.getBoundingClientRect();
            let cx = e.clientX, cy = e.clientY;
            if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            return [ (cx - rect.left)/grScale, (cy - rect.top)/grScale ];
        }

        dom.grOverlay.addEventListener('mousedown', grStart); dom.grOverlay.addEventListener('touchstart', grStart, {passive:false});
        function grStart(e) {
            if(e.touches && e.touches.length>1) return;
            e.preventDefault();
            const [x, y] = getGrMousePos(e);
            
            grDragState = null;
            const tol = 20/grScale;
            if(grCropRect.w > 0) {
                const h = { tl:{x:grCropRect.x,y:grCropRect.y}, tr:{x:grCropRect.x+grCropRect.w,y:grCropRect.y}, bl:{x:grCropRect.x,y:grCropRect.y+grCropRect.h}, br:{x:grCropRect.x+grCropRect.w,y:grCropRect.y+grCropRect.h} };
                for(let k in h) { if(Math.abs(x-h[k].x)<tol && Math.abs(y-h[k].y)<tol) { grDragState = `resize-${k}`; break; } }
                if(!grDragState && x>grCropRect.x && x<grCropRect.x+grCropRect.w && y>grCropRect.y && y<grCropRect.y+grCropRect.h) grDragState = 'move';
            }

            if(grDragState) { grStartX=x; grStartY=y; grStartRect={...grCropRect}; }
            else {
                grIsDrawing = true; grStartX = x; grStartY = y;
                grCropRect = {x, y, w:0, h:0};
                drawGrOverlay();
            }
        }

        dom.grOverlay.addEventListener('mousemove', grMove); dom.grOverlay.addEventListener('touchmove', grMove, {passive:false});
        function grMove(e) {
            if(e.touches && e.touches.length>1) return;
            e.preventDefault();
            const [x, y] = getGrMousePos(e);
            
            if(grIsDrawing) {
                grCropRect.x = Math.min(x, grStartX); grCropRect.y = Math.min(y, grStartY);
                grCropRect.w = Math.abs(x - grStartX); grCropRect.h = Math.abs(y - grStartY);
            } else if(grDragState) {
                const dx = x - grStartX, dy = y - grStartY;
                if(grDragState === 'move') { grCropRect.x = grStartRect.x + dx; grCropRect.y = grStartRect.y + dy; }
                else {
                    if(grDragState.includes('l')) { grCropRect.x = grStartRect.x+dx; grCropRect.w = grStartRect.w-dx; }
                    if(grDragState.includes('r')) { grCropRect.w = grStartRect.w+dx; }
                    if(grDragState.includes('t')) { grCropRect.y = grStartRect.y+dy; grCropRect.h = grStartRect.h-dy; }
                    if(grDragState.includes('b')) { grCropRect.h = grStartRect.h+dy; }
                    if(grCropRect.w<10) { grCropRect.w=10; if(grDragState.includes('l')) grCropRect.x = grStartRect.x+grStartRect.w-10; }
                    if(grCropRect.h<10) { grCropRect.h=10; if(grDragState.includes('t')) grCropRect.y = grStartRect.y+grStartRect.h-10; }
                }
            } else return; 

            dom.grW.value = Math.round(grCropRect.w); dom.grH.value = Math.round(grCropRect.h);
            drawGrOverlay();
        }

        const grEnd = () => { grIsDrawing = false; grDragState = null; };
        dom.grOverlay.addEventListener('mouseup', grEnd); dom.grOverlay.addEventListener('mouseout', grEnd); dom.grOverlay.addEventListener('touchend', grEnd);

        // 应用全局约束
        function applyGlobalResize() {
            const newW = Math.round(grCropRect.w), newH = Math.round(grCropRect.h);
            const mode = dom.grMode.value; // crop | stretch | contain
            if(newW < 10 || newH < 10) { showToast('选区无效', 'error'); return; }

            const applyTo = (item) => {
                const nc = document.createElement('canvas'); nc.width = newW; nc.height = newH;
                const ctx = nc.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,newW,newH);
                
                if(mode === 'crop') {
                    ctx.drawImage(item.canvas, grCropRect.x, grCropRect.y, newW, newH, 0, 0, newW, newH);
                } else if(mode === 'stretch') {
                    ctx.drawImage(item.canvas, 0, 0, newW, newH);
                } else { 
                    const r = Math.min(newW/item.canvas.width, newH/item.canvas.height);
                    const dw = item.canvas.width*r, dh = item.canvas.height*r;
                    ctx.drawImage(item.canvas, (newW-dw)/2, (newH-dh)/2, dw, dh);
                }
                item.canvas = nc;
            };

            state.frames.forEach(applyTo); state.materials.forEach(applyTo);
            state.width = newW; state.height = newH;
            syncState(); closeGlobalResizeModal(); showToast('全局更新成功', 'success');
        }

        function toggleRatioLock() {
            isRatioLocked = !isRatioLocked;
            dom.iconLock.setAttribute('data-lucide', isRatioLocked ? 'lock' : 'unlock');
            dom.btnLockRatio.classList.toggle('text-indigo-600', isRatioLocked);
            dom.btnLockRatio.classList.toggle('text-gray-400', !isRatioLocked);
            if(isRatioLocked) originalRatio = (parseInt(dom.grW.value) || state.width) / (parseInt(dom.grH.value) || state.height);
            lucide.createIcons();
        }

        // ================= 2. 单帧编辑与虚拟图层防裁剪逻辑 =================
        let editTool = 'draw'; // draw, move, pan, crop
        let vLayerCanvas = document.createElement('canvas'); // 虚拟图层(超大)
        let vLayerX = 0, vLayerY = 0; 
        let editZoom = 1;
        let isEditAction = false; 
        const MAX_HISTORY = 20;
        let editHistory = [];

        function setEditTool(tool) {
            editTool = tool;
            ['draw','move','pan','crop'].forEach(t => {
                const b = document.getElementById('tool-'+t);
                if(t===tool) { b.classList.add('bg-indigo-100','text-indigo-600'); b.classList.remove('text-gray-600'); }
                else { b.classList.remove('bg-indigo-100','text-indigo-600'); b.classList.add('text-gray-600'); }
            });
            let cur = 'crosshair';
            if(tool==='move') cur='move'; if(tool==='pan') cur='grab';
            dom.editInteraction.style.cursor = cur;
        }

        // 打开编辑器时初始化图层
        function openEditModal(fid) {
            stopPreview(); editingFrameId = fid;
            const f = state.frames.find(x => x.id === fid); if(!f) return;
            
            dom.editModal.classList.remove('hidden');

            dom.editBounds.style.width = state.width + 'px';
            dom.editBounds.style.height = state.height + 'px';
            dom.editCanvas.width = state.width; dom.editCanvas.height = state.height;
            dom.editInteraction.width = state.width; dom.editInteraction.height = state.height;
            
            vLayerCanvas.width = state.width * 3;
            vLayerCanvas.height = state.height * 3;
            const vctx = vLayerCanvas.getContext('2d');
            vctx.drawImage(f.canvas, state.width, state.height);
            vLayerX = -state.width; vLayerY = -state.height; 

            editHistory = []; pushUndo(); 
            setEditTool('draw'); 
            resetEditScale();
            renderEditViewport();
        }

        function renderEditViewport() {
            const ctx = dom.editCanvas.getContext('2d');
            ctx.clearRect(0,0, state.width, state.height);
            ctx.drawImage(vLayerCanvas, vLayerX, vLayerY);
        }

        function closeEditModal() { dom.editModal.classList.add('hidden'); editingFrameId = null; if(state.isPlaying) startPreview(); }

        // 撤销栈逻辑
        function pushUndo() {
            editHistory.push({ imgData: vLayerCanvas.toDataURL(), x: vLayerX, y: vLayerY });
            if(editHistory.length > MAX_HISTORY) editHistory.shift();
            dom.btnUndo.disabled = editHistory.length <= 1;
        }
        function undoEdit() {
            if(editHistory.length <= 1) return;
            editHistory.pop(); // 抛弃当前
            const prev = editHistory[editHistory.length-1];
            const img = new Image(); img.onload = () => {
                vLayerCanvas.getContext('2d').clearRect(0,0,vLayerCanvas.width,vLayerCanvas.height);
                vLayerCanvas.getContext('2d').drawImage(img,0,0);
                vLayerX = prev.x; vLayerY = prev.y;
                renderEditViewport(); dom.btnUndo.disabled = editHistory.length <= 1;
            };
            img.src = prev.imgData;
        }

        // 保存编辑
        function saveEditAndApply() {
            const f = state.frames.find(x => x.id === editingFrameId);
            if(f) {
                const nc = document.createElement('canvas'); nc.width = state.width; nc.height = state.height;
                nc.getContext('2d').drawImage(dom.editCanvas, 0, 0);
                f.canvas = nc; syncState(); showToast('保存成功', 'success');
            }
            closeEditModal();
        }

        // 视图缩放控制 (加入绝对安全阈值计算)
        function resetEditScale() {
            const pw = Math.max(10, dom.editViewport.clientWidth - 40);
            const ph = Math.max(10, dom.editViewport.clientHeight - 40);
            editZoom = Math.max(0.01, Math.min(pw/state.width, ph/state.height, 1));
            dom.editTransform.style.transform = `scale(${editZoom})`;
        }

        // 滚轮 / 双指逻辑
        dom.editViewport.addEventListener('wheel', (e) => {
            if(e.ctrlKey || e.metaKey) { e.preventDefault(); editZoom += e.deltaY>0?-0.1:0.1; editZoom = Math.max(0.1, Math.min(editZoom, 10)); dom.editTransform.style.transform = `scale(${editZoom})`; }
        }, {passive:false});
        
        let pinchDist = 0, pinchInitZoom = 1;
        dom.editViewport.addEventListener('touchstart', (e) => {
            if(e.touches.length===2) { e.preventDefault(); pinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); pinchInitZoom = editZoom; }
        }, {passive:false});
        dom.editViewport.addEventListener('touchmove', (e) => {
            if(e.touches.length===2 && pinchDist) { e.preventDefault(); const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); editZoom = Math.max(0.1, Math.min(pinchInitZoom*(d/pinchDist), 10)); dom.editTransform.style.transform = `scale(${editZoom})`; }
        }, {passive:false});

        // ================= 编辑工具交互逻辑 =================
        function getEditPos(e) {
            const rect = dom.editInteraction.getBoundingClientRect();
            let cx = e.clientX, cy = e.clientY; if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            return [ (cx - rect.left)/editZoom, (cy - rect.top)/editZoom ];
        }

        let editStartX=0, editStartY=0;
        let pScrollX=0, pScrollY=0; 
        
        // 独立裁切状态 (针对单帧局部)
        let ecCropRect = {x:0,y:0,w:0,h:0};
        let ecIsCropping = false;

        dom.editInteraction.addEventListener('mousedown', editStart); dom.editInteraction.addEventListener('touchstart', editStart, {passive:false});
        function editStart(e) {
            if(e.touches && e.touches.length>1) return;
            e.preventDefault();
            const [x,y] = getEditPos(e);
            isEditAction = true;
            editStartX = x; editStartY = y;

            if(editTool === 'pan') { pScrollX = dom.editViewport.scrollLeft; pScrollY = dom.editViewport.scrollTop; dom.editInteraction.style.cursor='grabbing'; return; }
            
            pushUndo();

            if(editTool === 'draw') {
                const ctx = vLayerCanvas.getContext('2d');
                ctx.beginPath(); ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle = dom.brushColor.value; ctx.lineWidth = parseInt(dom.brushSize.value);
                ctx.moveTo(x - vLayerX, y - vLayerY);
            } else if(editTool === 'crop') {
                ecIsCropping = true; ecCropRect = {x, y, w:0, h:0};
            }
        }

        dom.editInteraction.addEventListener('mousemove', editMove); dom.editInteraction.addEventListener('touchmove', editMove, {passive:false});
        function editMove(e) {
            if(!isEditAction || (e.touches && e.touches.length>1)) return;
            e.preventDefault();
            const cx = e.clientX || (e.touches?e.touches[0].clientX:0);
            const cy = e.clientY || (e.touches?e.touches[0].clientY:0);
            const [x,y] = getEditPos(e);

            if(editTool === 'pan') { dom.editViewport.scrollLeft = pScrollX - (cx - editStartX); dom.editViewport.scrollTop = pScrollY - (cy - editStartY); return; }

            if(editTool === 'move') {
                const dx = x - editStartX, dy = y - editStartY;
                vLayerX += dx; vLayerY += dy;
                editStartX = x; editStartY = y;
                renderEditViewport();
            } else if(editTool === 'draw') {
                const ctx = vLayerCanvas.getContext('2d');
                ctx.lineTo(x - vLayerX, y - vLayerY); ctx.stroke();
                renderEditViewport();
            } else if(editTool === 'crop') {
                ecCropRect.x = Math.min(x, editStartX); ecCropRect.y = Math.min(y, editStartY);
                ecCropRect.w = Math.abs(x - editStartX); ecCropRect.h = Math.abs(y - editStartY);
                
                const ictx = dom.editInteraction.getContext('2d');
                ictx.clearRect(0,0,state.width,state.height);
                ictx.fillStyle = 'rgba(0,0,0,0.4)'; ictx.fillRect(0,0,state.width,state.height);
                ictx.clearRect(ecCropRect.x, ecCropRect.y, ecCropRect.w, ecCropRect.h);
                ictx.setLineDash([4,4]); ictx.strokeStyle='#fff'; ictx.lineWidth=1/editZoom; ictx.strokeRect(ecCropRect.x, ecCropRect.y, ecCropRect.w, ecCropRect.h);
                ictx.setLineDash([]);
            }
        }

        const editEnd = () => { 
            isEditAction = false;

            if(editTool==='crop' && ecIsCropping) {

                    const temp = document.createElement('canvas'); temp.width = ecCropRect.w; temp.height = ecCropRect.h;

                }

        // ================= 3. 拖拽素材文件入库逻辑 =================
        function renderMaterialList() {
            dom.materialList.innerHTML = '';
            state.materials.forEach(mat => {
                const li = document.createElement('li'); li.className='relative group bg-white border border-gray-200 rounded overflow-hidden shadow-sm flex flex-col items-center'; li.dataset.id=mat.id;
                const top = document.createElement('div'); top.className='relative h-20 w-full checkerboard-bg flex-shrink-0';
                const cvs = document.createElement('canvas'); cvs.className='absolute inset-0 w-full h-full object-contain p-1 pointer-events-none';
                cvs.width = state.width||mat.canvas.width; cvs.height = state.height||mat.canvas.height; cvs.getContext('2d').drawImage(mat.canvas,0,0);
                const btn = document.createElement('button'); btn.className='absolute top-1 right-1 bg-red-500 text-white p-1 rounded opacity-0 group-hover:opacity-100 shadow z-10'; btn.innerHTML='<i data-lucide="x" class="w-3 h-3"></i>';
                btn.onclick = (e) => { e.stopPropagation(); state.materials = state.materials.filter(m=>m.id!==mat.id); renderMaterialList(); };
                top.appendChild(cvs); top.appendChild(btn); li.appendChild(top); dom.materialList.appendChild(li);
            });
            lucide.createIcons();
        }
        function createMaterialFromCanvas(cvs) {
            const n = document.createElement('canvas'); n.width=cvs.width; n.height=cvs.height; n.getContext('2d').drawImage(cvs,0,0);
            state.materials.unshift({id:`m_${Date.now()}`, canvas:n}); renderMaterialList();
        }

        dom.materialZone.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); dom.materialZone.classList.add('bg-indigo-50'); });
        dom.materialZone.addEventListener('dragleave', (e) => { e.preventDefault(); e.stopPropagation(); dom.materialZone.classList.remove('bg-indigo-50'); });
        dom.materialZone.addEventListener('drop', async (e) => {
            e.preventDefault(); e.stopPropagation(); dom.materialZone.classList.remove('bg-indigo-50');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            for (const file of files) {
                if (file.type === 'image/gif') { showToast('暂不支持GIF入库', 'info'); continue; }
                await new Promise((resolve) => {
                    const img = new Image(); const objectUrl = URL.createObjectURL(file);
                    img.onload = () => {
                        if (state.width === 0 || state.height === 0) { state.width = img.width; state.height = img.height; }
                        const tempCanvas = document.createElement('canvas'); tempCanvas.width = state.width; tempCanvas.height = state.height;
                        drawResizedCanvasCore(tempCanvas.getContext('2d'), img, state.width, state.height, 'contain');
                        createMaterialFromCanvas(tempCanvas); URL.revokeObjectURL(objectUrl); resolve();
                    };
                    img.onerror = resolve; img.src = objectUrl;
                });
            }
        });

        document.body.addEventListener('dragover', (e) => { e.preventDefault(); if (e.dataTransfer && e.dataTransfer.types && Array.from(e.dataTransfer.types).includes('Files')) document.body.classList.add('drag-active'); });
        document.body.addEventListener('dragleave', (e) => { e.preventDefault(); if (e.clientX === 0 && e.clientY === 0) document.body.classList.remove('drag-active'); });
        document.body.addEventListener('drop', (e) => {
            e.preventDefault(); document.body.classList.remove('drag-active');
            if (!e.dataTransfer || !e.dataTransfer.types || !Array.from(e.dataTransfer.types).includes('Files')) return;
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (file.type === 'image/gif') processGifFile(file);
                else if (file.type.startsWith('image/')) {
                    const validFiles = Array.from(files).filter(f => f.type.startsWith('image/') && f.type !== 'image/gif');
                    if (validFiles.length > 0) processImageFiles(validFiles);
                } else showToast('不支持的文件格式', 'error');
            }
        });

        // 9. 导出逻辑
        function exportGIF() {
            if(!state.frames.length) return;
            dom.btnExport.disabled = true; dom.btnExport.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>编码中...</span>`;
            lucide.createIcons(); showToast('开始构建 GIF...', 'info');

            const gif = new GIF({ workers: 2, quality: 10, width: state.width, height: state.height, workerScript: state.workerBlobUrl || 'https://unpkg.com/gif.js@0.2.0/dist/gif.worker.js' });
            state.frames.forEach(f => gif.addFrame(f.canvas, { delay: f.delay, copy: true }));

            gif.on('finished', blob => {
                const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `exported_${Date.now()}.gif`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                dom.btnExport.disabled = false; dom.btnExport.innerHTML = `<i data-lucide="download" class="w-4 h-4"></i> <span>导出</span>`; lucide.createIcons(); showToast('导出成功', 'success');
            });
            gif.on('progress', p => { dom.btnExport.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>${Math.round(p*100)}%</span>`; lucide.createIcons(); });
            gif.render();
        }
    </script>
</body>
