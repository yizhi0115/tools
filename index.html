<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人工具库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans text-gray-800 relative">

    <!-- 移动端遮罩层 -->
    <div id="mobile-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden transition-opacity"></div>

    <!-- 左侧导航栏 -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 md:relative z-40 w-48 bg-gray-900 text-white flex flex-col h-full shadow-lg transition-all duration-300 ease-in-out flex-shrink-0 -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-lg font-bold tracking-wider truncate">个人工具库</h1>
            <p class="text-xs text-gray-400 mt-1 truncate">本地及 GitHub</p>
        </div>
        
        <nav class="flex-1 overflow-y-auto no-scrollbar py-4" id="nav-menu">
            <!-- 导航菜单将由 JavaScript 动态生成 -->
        </nav>
        
        <div class="p-4 border-t border-gray-700 text-xs text-gray-500 text-center">
            &copy; 2026 个人专属工具
        </div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="flex-1 bg-gray-50 flex flex-col relative min-w-0" id="main-content">
        
        <!-- 极简顶部控制栏 -->
        <header class="h-12 bg-white border-b border-gray-200 flex items-center px-4 flex-shrink-0 z-10 shadow-sm">
            <button onclick="toggleSidebar()" class="p-1.5 text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded transition-colors focus:outline-none" title="折叠/展开侧边栏">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="h-4 w-px bg-gray-300 mx-4"></div>
            <span id="current-tool-title" class="text-sm font-semibold text-gray-700 tracking-wide">首页指南</span>
        </header>

        <!-- 工具挂载容器区 -->
        <div class="flex-1 overflow-auto bg-gray-50">
            <div class="w-full h-full relative">
                
                <!-- ================= 首页指南 (原生内容) ================= -->
                <section id="welcome" class="absolute inset-0 overflow-y-auto block p-8">
                    <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-200">
                        <h2 class="text-2xl font-bold mb-4">欢迎使用个人工具库 (动态沙箱版)</h2>
                        <p class="mb-4 text-gray-700">为避免代码冲突（如 CSS 样式污染、全局 JS 变量覆盖），本框架已采用 <strong>Iframe 隔离架构</strong>与<strong>动态配置驱动</strong>模式。</p>
                        
                        <h3 class="text-lg font-semibold mt-6 mb-2">标准接入流程：</h3>
                        <ol class="list-decimal pl-6 space-y-3 text-gray-700">
                            <li>将您以前保存的独立网页程序（例如 <code>regex_tool.html</code>）直接放入与本 <code>index.html</code> 同级的目录，或新建一个 <code>tools</code> 文件夹进行集中管理。</li>
                            <li>使用配套的 <strong>GitHub全栈管理系统</strong>，在【自动化工具接入】页面一键上传文件。</li>
                            <li>使用管理系统的【模块部署沙盘】进行排序或隐藏操作。</li>
                        </ol>
                    </div>
                </section>

                <!-- ================= Iframe 沙箱容器 ================= -->
                <iframe id="tool-frame" class="absolute inset-0 w-full h-full border-0 hidden" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads"></iframe>
                
            </div>
        </div>

    </main>

    <!-- 全局框架控制逻辑 -->
    <script>
        // ================= 1. 工具库注册配置 =================
        const TOOL_CONFIG = [
            { id: 'welcome', title: '首页指南', type: 'native' },
            // 取消下方注释并修改 URL 即可手动接入您的现有程序：
            // { id: 'tool-timestamp', title: '时间戳转换', type: 'iframe', url: './tools/timestamp.html' },
             { id: 'tool-crypto', title: '抽奖', type: 'iframe', url: './抽奖.html' },
             { id: 'tool-custom', title: 'gif编辑器', type: 'iframe', url: './gif.html' }
        ];

        // ================= 2. 核心调度引擎 =================
        document.addEventListener('DOMContentLoaded', () => {
            renderNavigation();
        });

        function renderNavigation() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = '';

            TOOL_CONFIG.forEach(tool => {
                const btn = document.createElement('button');
                btn.className = `nav-btn w-full text-left px-6 py-3 hover:bg-gray-800 transition-colors border-l-4 ${tool.id === 'welcome' ? 'bg-gray-800 border-blue-500' : 'border-transparent'}`;
                btn.textContent = tool.title;
                btn.dataset.id = tool.id;
                btn.onclick = () => dispatchRoute(tool);
                navMenu.appendChild(btn);
            });
        }

        function dispatchRoute(tool) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.id === tool.id) {
                    btn.classList.add('bg-gray-800', 'border-blue-500');
                    btn.classList.remove('border-transparent');
                } else {
                    btn.classList.remove('bg-gray-800', 'border-blue-500');
                    btn.classList.add('border-transparent');
                }
            });

            const titleEl = document.getElementById('current-tool-title');
            if (titleEl) {
                titleEl.textContent = tool.title;
            }

            const welcomeSection = document.getElementById('welcome');
            const iframeEl = document.getElementById('tool-frame');

            if (tool.type === 'native') {
                iframeEl.classList.add('hidden');
                iframeEl.src = ''; 
                welcomeSection.classList.remove('hidden');
                welcomeSection.classList.add('block');
            } else if (tool.type === 'iframe') {
                welcomeSection.classList.remove('block');
                welcomeSection.classList.add('hidden');
                iframeEl.classList.remove('hidden');
                if (iframeEl.src !== tool.url) {
                    iframeEl.src = tool.url; 
                }
            }

            // 移动端：点击菜单后自动收起
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('mobile-overlay').classList.add('hidden');
            }
        }

        // ================= 3. 严格状态隔离的折叠控制 =================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');

            if (window.innerWidth < 768) {
                // 移动端：推拉面板 + 切换遮罩层
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            } else {
                // 桌面端：只控制负边距进行空间挤压，剥离 Tailwind 冲突
                sidebar.classList.toggle('-ml-48');
            }
        }

        // 视口尺寸变化监听：防止跨断点拖拽时的状态污染
        let lastIsMobile = window.innerWidth < 768;
        window.addEventListener('resize', () => {
            const isMobile = window.innerWidth < 768;
            
            if (isMobile !== lastIsMobile) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('mobile-overlay');
                
                if (isMobile) {
                    // 降级到移动端：强行抹除桌面端的负边距，恢复隐藏状态
                    sidebar.classList.remove('-ml-48');
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                } else {
                    // 升级到桌面端：强行抹除桌面端的负边距，靠 CSS 断点恢复呈现
                    sidebar.classList.remove('-ml-48');
                    sidebar.classList.add('-translate-x-full'); 
                    overlay.classList.add('hidden');
                }
                lastIsMobile = isMobile;
            }
        });
    </script>
</body>
</html>
