<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人工具库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans text-gray-800 relative">

    <!-- 移动端遮罩层 -->
    <div id="mobile-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden transition-opacity"></div>

    <!-- 左侧导航栏 -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 md:relative z-40 w-48 bg-gray-900 text-white flex flex-col h-full shadow-lg transition-all duration-300 ease-in-out flex-shrink-0 -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-lg font-bold tracking-wider truncate">个人工具库</h1>
            <p class="text-xs text-gray-400 mt-1 truncate">本地及 GitHub</p>
        </div>
        
        <nav class="flex-1 overflow-y-auto no-scrollbar py-4" id="nav-menu">
            <!-- 导航菜单将由 JavaScript 动态生成 -->
        </nav>
        
        <div class="p-4 border-t border-gray-700 text-xs text-gray-500 text-center">
            &copy; 2026 个人专属工具
        </div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="flex-1 bg-gray-50 flex flex-col relative min-w-0" id="main-content">
        
        <!-- 极简顶部控制栏 (悬浮感应式引擎) -->
        <div class="w-full z-20 md:absolute md:top-0 md:left-0 group/header md:pointer-events-none transition-all">
            <!-- 桌面端隐形感应区：仅在桌面端负责捕捉鼠标轨迹 -->
            <div class="hidden md:block absolute top-0 left-0 w-full h-10 z-10 pointer-events-auto"></div>
            
            <header class="h-12 bg-white/90 backdrop-blur-md border-b border-gray-200 flex items-center px-4 shadow-sm relative z-20 md:pointer-events-auto transition-transform duration-300 ease-out md:-translate-y-full md:group-hover/header:translate-y-0">
                <button onclick="toggleSidebar()" class="p-1.5 text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded transition-colors focus:outline-none" title="折叠/展开侧边栏">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="h-4 w-px bg-gray-300 mx-4"></div>
                <span id="current-tool-title" class="text-sm font-semibold text-gray-700 tracking-wide">全景工作台</span>
            </header>
        </div>

        <!-- 工具挂载容器区 -->
        <div class="flex-1 overflow-auto bg-gray-50 relative">
            <!-- 核心沙箱引擎 -->
            <iframe id="tool-frame" class="absolute inset-0 w-full h-full border-0 hidden bg-white" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads"></iframe>
        </div>

    </main>

    <!-- 全局框架控制逻辑 -->
    <script>
        // ================= 1. 工具库注册配置 (全局挂载以支持内部组件跨域读取) =================
        window.TOOL_CONFIG = [
            { id: 'welcome', title: '全景工作台', type: 'iframe', url: './dashboard.html' },
            { id: 'tool-timestamp', title: '题库', type: 'iframe', url: './tiku.html' },
            { id: 'tool-crypto', title: '抽奖系统', type: 'iframe', url: './抽奖.html' },
            { id: 'tool-custom', title: 'gif转换', type: 'iframe', url: './gif.html' },
            // 新增：利用 external 类型安全挂载受安全策略保护的外部系统
            { id: 'tool-gemini', title: 'Gemini', type: 'external', url: 'https://gemini.google.com' },
        ];

        // ================= 2. 核心调度引擎 =================
        document.addEventListener('DOMContentLoaded', () => {
            renderNavigation();
            // 初始化时强制装载工作台
            if (window.TOOL_CONFIG.length > 0) {
                dispatchRoute(window.TOOL_CONFIG[0]);
            }
        });

        // 新增：IPC 跨域通信总线，解决本地 file:// 协议下的跨域隔离拦截
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'REQUEST_TOOLS') {
                // 将配置项安全投递给工作台沙箱
                const iframe = document.getElementById('tool-frame');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'SYNC_TOOLS', tools: window.TOOL_CONFIG }, '*');
                }
            } else if (event.data && event.data.type === 'NAVIGATE_TOOL') {
                // 接收工作台发出的路由跳转请求
                const targetTool = window.TOOL_CONFIG.find(t => t.id === event.data.id);
                if (targetTool) dispatchRoute(targetTool);
            }
        });

        function renderNavigation() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = '';

            window.TOOL_CONFIG.forEach(tool => {
                const btn = document.createElement('button');
                btn.className = `nav-btn w-full text-left px-6 py-3 hover:bg-gray-800 transition-colors border-l-4 ${tool.id === 'welcome' ? 'bg-gray-800 border-blue-500' : 'border-transparent'}`;
                
                // 为外部链接增加视觉标识 (可选)
                if (tool.type === 'external') {
                    btn.innerHTML = `<div class="flex items-center justify-between w-full"><span>${tool.title}</span><svg class="w-3.5 h-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg></div>`;
                } else {
                    btn.textContent = tool.title;
                }
                
                btn.dataset.id = tool.id;
                btn.onclick = () => dispatchRoute(tool);
                navMenu.appendChild(btn);
            });
        }

        function dispatchRoute(tool) {
            // 架构升级：外部链接拦截层，规避 Clickjacking 防护导致的 iframe 拒绝访问
            if (tool.type === 'external') {
                window.open(tool.url, '_blank');
                // 移动端交互闭环：点击外链后亦收起侧边栏
                if (window.innerWidth < 768) {
                    document.getElementById('sidebar').classList.add('-translate-x-full');
                    document.getElementById('mobile-overlay').classList.add('hidden');
                }
                return; // 终止执行，不影响当前主框架的 UI 状态和 iframe
            }

            // 刷新侧边栏激活状态
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.id === tool.id) {
                    btn.classList.add('bg-gray-800', 'border-blue-500');
                    btn.classList.remove('border-transparent');
                } else {
                    btn.classList.remove('bg-gray-800', 'border-blue-500');
                    btn.classList.add('border-transparent');
                }
            });

            // 更新顶部标题
            const titleEl = document.getElementById('current-tool-title');
            if (titleEl) {
                titleEl.textContent = tool.title;
            }

            // 执行沙箱路由跳转
            const iframeEl = document.getElementById('tool-frame');
            iframeEl.classList.remove('hidden');
            
            // 后缀防抖比对，防止同一路由重复触发重载闪烁
            let targetUrl = tool.url;
            if (iframeEl.src !== targetUrl && !iframeEl.src.endsWith(targetUrl.replace('./', ''))) {
                iframeEl.src = targetUrl; 
            }

            // 移动端：点击菜单后自动收起遮罩层
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('mobile-overlay').classList.add('hidden');
            }
        }

        // ================= 3. 严格状态隔离的折叠控制 =================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');

            if (window.innerWidth < 768) {
                // 移动端交互
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            } else {
                // 桌面端交互 (规避 Tailwind 类名优先级冲突)
                sidebar.classList.toggle('-ml-48');
            }
        }

        // 视口尺寸变化监听器 (防状态污染引擎)
        let lastIsMobile = window.innerWidth < 768;
        window.addEventListener('resize', () => {
            const isMobile = window.innerWidth < 768;
            
            if (isMobile !== lastIsMobile) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('mobile-overlay');
                
                if (isMobile) {
                    sidebar.classList.remove('-ml-48');
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                } else {
                    sidebar.classList.remove('-ml-48');
                    sidebar.classList.add('-translate-x-full'); 
                    overlay.classList.add('hidden');
                }
                lastIsMobile = isMobile;
            }
        });
    </script>
</body>
</html>
