let questions = [];
let userAnswers = {};
let currentIndex = 0;
let appState = 'loading'; // 'loading', 'home', 'exam', 'result'
let isWrongQuestionMode = false;

function parseOptions(text) {
    const opts = [];
    const optRegex = /([A-F])\s*[、\.]\s*(.*?)(?=(?:[A-F]\s*[、\.]|$))/g;
    let match;
    while ((match = optRegex.exec(text)) !== null) {
        opts.push({ letter: match[1], text: match[2].trim() });
    }
    return opts;
}

function parseBlock(rawText, type) {
    const lines = rawText.split('\n');
    const qs = [];
    let currentQ = null;
    let optionBuffer = "";

    for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        let match;
        if (type === 'judge') {
            match = line.match(/^\s*([TF])\s+(\d+)[.、\s]*(.*)/i);
        } else {
            match = line.match(/^\s*([A-Z]+)\s+(\d+)[.、\s]*(.*)/i);
        }

        if (match) {
            if (currentQ) {
                if (type !== 'judge') currentQ.options = parseOptions(optionBuffer);
                qs.push(currentQ);
            }
            currentQ = {
                id: `${type}_${match[2]}_${new Date().getTime()}`,
                type: type,
                originalNumber: match[2],
                correctAnswer: match[1].toUpperCase().split('').sort().join(''),
                text: match[3],
                options: type === 'judge' ? [
                    { letter: 'T', text: '正确' },
                    { letter: 'F', text: '错误' }
                ] : []
            };
            optionBuffer = "";
        } else if (currentQ) {
            optionBuffer += " " + line;
        }
    }
    if (currentQ) {
        if (type !== 'judge') currentQ.options = parseOptions(optionBuffer);
        qs.push(currentQ);
    }
    return qs;
}

function importWrongQuestions(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const importedData = JSON.parse(e.target.result);
            if (!Array.isArray(importedData) || importedData.length === 0) {
                throw new Error("无有效错题数据");
            }
            questions = importedData;
            userAnswers = {};
            currentIndex = 0;
            isWrongQuestionMode = true;
            appState = 'exam';
            document.getElementById('header-subtitle').innerText = `【错题专场考场】：共 ${questions.length} 题`;

            alert('错题本导入失败！请确保上传的是系统导出的专属重练包 .json 文件。');

    };
    reader.readAsText(file);
}

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
                <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-400 font-medium">或者进行专项突破</span></div>
            </div>

            <!-- 错题本导入 -->
            <label class="block w-full py-4 rounded-xl font-bold text-blue-600 bg-blue-50 border-2 border-dashed border-blue-200 hover:bg-blue-100 cursor-pointer text-center transition-all text-lg flex justify-center items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                导入系统重练包 (.json)
                <input type="file" accept=".json" onchange="importWrongQuestions(event)" class="hidden">
            </label>
        </div>
    </div>`;
    document.getElementById('app-container').innerHTML = html;
}

function getScoreData() {
    let correctCount = 0;
    questions.forEach(q => {
        if (userAnswers[q.id] === q.correctAnswer) correctCount++;
    });
    return {
        correctCount,
        total: questions.length,
        score: questions.length ? Math.round((correctCount / questions.length) * 100) : 0
    };
}

function handleAnswer(qId, optionLetter, type) {
    if (type === 'single' || type === 'judge') {
        userAnswers[qId] = optionLetter;
    } else if (type === 'multiple') {
        let currentAns = userAnswers[qId] ? userAnswers[qId].split('') : [];
        if (currentAns.includes(optionLetter)) {
            currentAns = currentAns.filter(l => l !== optionLetter);
        } else {
            currentAns.push(optionLetter);
        }
        userAnswers[qId] = currentAns.sort().join('');
    }
    renderExam();
}

function goPrev() {
    if (currentIndex > 0) {
        currentIndex--;
        renderExam();
    }
}

function goNext() {
    if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderExam();
    }
}

function jumpTo(idx) {
    currentIndex = idx;
    renderExam();
}

function submitExam() {
    const answeredCount = Object.keys(userAnswers).length;
    if (answeredCount < questions.length) {
        const confirmSubmit = window.confirm(`您还有 ${questions.length - answeredCount} 道题目未作答，确认要强行交卷吗？`);
        if (!confirmSubmit) return;
    }
    appState = 'result';
    renderResult();
}

function renderGridHTML() {
    let html = '';
    ['single', 'multiple', 'judge'].forEach(typeKey => {
        const qs = questions.filter(q => q.type === typeKey);
        if (qs.length === 0) return;
        const title = typeKey === 'single' ? '单选' : (typeKey === 'multiple' ? '多选' : '判断');
        html += `<div class="text-xs text-gray-400 mb-2 font-bold mt-4">${title} (${qs.length}题)</div>
                 <div class="grid grid-cols-5 gap-2">`;
        
        qs.forEach(q => {
            const idx = questions.findIndex(item => item.id === q.id);
            const isDone = userAnswers[q.id] !== undefined && userAnswers[q.id].length > 0;
            const isCurrent = idx === currentIndex;
            
            let cls = 'h-8 text-xs font-medium rounded-md transition-all ';
            if (isCurrent) cls += 'ring-2 ring-blue-500 ring-offset-1 ';
            if (isDone) cls += 'bg-blue-100 text-blue-700 border border-blue-200';
            else cls += 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100';

            html += `<button onclick="jumpTo(${idx})" class="${cls}">${q.originalNumber}</button>`;
        });
        html += `</div>`;
    });
    return html;
}

function renderExam() {
    if (questions.length === 0) return;
    const currentQ = questions[currentIndex];
    
    const typeLabel = {
        'single': '单项选择题',
        'multiple': '多项选择题 (漏选错选均不得分)',
        'judge': '判断题'
    }[currentQ.type];
    const typeClass = currentQ.type === 'multiple' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700';

    let optionsHtml = '';
    currentQ.options.forEach((opt, idx) => {
        const isSelected = currentQ.type === 'multiple' 
            ? (userAnswers[currentQ.id] || '').includes(opt.letter) 
            : userAnswers[currentQ.id] === opt.letter;
        
        const inputType = currentQ.type === 'multiple' ? 'checkbox' : 'radio';
        const activeCls = isSelected ? 'border-blue-500 bg-blue-50/50' : 'border-gray-200 hover:bg-gray-50';
        
        optionsHtml += `
            <label class="flex items-start p-4 border rounded-lg cursor-pointer transition-all ${activeCls}">
                <input type="${inputType}" name="q_${currentQ.id}" value="${opt.letter}" 
                       ${isSelected ? 'checked' : ''} 
                       onchange="handleAnswer('${currentQ.id}', '${opt.letter}', '${currentQ.type}')" 
                       class="mt-1 w-4 h-4 text-blue-600 border-gray-300 ${currentQ.type === 'multiple' ? 'rounded' : 'focus:ring-blue-500'}">
                <div class="ml-3">
                    <span class="font-semibold text-gray-700 mr-2">${opt.letter}.</span>
                    <span class="text-gray-700 whitespace-pre-wrap">${opt.text}</span>
                </div>
            </label>
        `;
    });

    const prevBtn = `<button onclick="goPrev()" ${currentIndex === 0 ? 'disabled' : ''} class="px-6 py-2 rounded-lg font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">上一题</button>`;
    const nextBtn = currentIndex === questions.length - 1 
        ? `<button onclick="submitExam()" class="px-8 py-2 rounded-lg font-medium text-white bg-green-600 hover:bg-green-700 shadow-md shadow-green-200 transition-colors">结束作答并交卷</button>`
        : `<button onclick="goNext()" class="px-6 py-2 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 shadow-md shadow-blue-200 transition-colors">下一题</button>`;

    const html = `
    <div class="flex flex-col md:flex-row gap-6 items-start">
        <div class="w-full md:w-3/4 bg-white rounded-xl shadow-sm border border-gray-100 p-6 md:p-10 min-h-[60vh] flex flex-col">
            <div class="flex justify-between items-center mb-8 pb-4 border-b border-gray-100">
                <span class="text-sm font-semibold px-3 py-1 rounded-md ${typeClass}">${typeLabel}</span>
                <span class="text-sm font-medium text-gray-500">本题数：${currentIndex + 1} / ${questions.length}</span>
            </div>
            <div class="flex-grow">
                <h3 class="text-lg font-medium text-gray-800 mb-6 leading-relaxed whitespace-pre-wrap">
                    <span class="font-bold mr-2 text-blue-600">${currentQ.originalNumber}.</span>${currentQ.text}
                </h3>
                <div class="space-y-4">${optionsHtml}</div>
            </div>
            <div class="flex justify-between items-center mt-10 pt-6 border-t border-gray-100">
                ${prevBtn} ${nextBtn}
            </div>
        </div>
        <div class="w-full md:w-1/4 bg-white rounded-xl shadow-sm border border-gray-100 p-6 sticky top-6 max-h-[85vh] overflow-y-auto scrollbar-hide">
            <div class="flex items-center text-gray-700 font-semibold mb-2">答题卡面板</div>
            ${renderGridHTML()}
            <div class="mt-8 pt-6 border-t border-gray-100">
                <button onclick="submitExam()" class="w-full py-3 rounded-lg font-bold text-white bg-gray-800 hover:bg-gray-900 transition-colors shadow-lg">提交试卷</button>
            </div>
        </div>
    </div>
    `;
    
    document.getElementById('app-container').innerHTML = html;
}

function renderResult() {
    const sd = getScoreData();
    document.getElementById('header-subtitle').innerText = `作答完毕 · ${isWrongQuestionMode ? '错题重练成绩' : '全真模拟成绩'}`;

    let reportHtml = `
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center mb-6">
        <h2 class="text-xl font-bold text-gray-800 mb-6">考核成绩报告</h2>
        <div class="inline-flex flex-col items-center justify-center w-40 h-40 rounded-full border-8 border-gray-50 mb-6">
            <span class="text-4xl font-black ${sd.score >= 60 ? 'text-green-600' : 'text-red-500'}">${sd.score}</span>
            <span class="text-sm font-medium text-gray-500 mt-1">分</span>
        </div>
        <div class="flex justify-center gap-8 text-sm font-medium text-gray-600 mb-8">
            <div class="bg-gray-50 px-4 py-2 rounded-lg">题量: ${sd.total} 题</div>
            <div class="bg-green-50 text-green-700 px-4 py-2 rounded-lg">正确: ${sd.correctCount} 题</div>
            <div class="bg-red-50 text-red-700 px-4 py-2 rounded-lg">错误: ${sd.total - sd.correctCount} 题</div>
        </div>
        <div class="flex flex-wrap justify-center gap-4">
            ${sd.correctCount < sd.total ? `
                <button onclick="exportWrongQuestionsDoc()" class="px-5 py-2.5 rounded-lg font-medium text-white bg-red-600 hover:bg-red-700 shadow-md shadow-red-200 transition-colors flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>导出打印背诵版 (Word)
                </button>
                <button onclick="exportWrongQuestionsJson()" class="px-5 py-2.5 rounded-lg font-medium text-white bg-orange-500 hover:bg-orange-600 shadow-md shadow-orange-200 transition-colors flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>导出系统重练包 (.json)
                </button>
            ` : ''}
            <button onclick="initApp()" class="px-6 py-2.5 rounded-lg font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors">返回首页</button>
        </div>
        ${sd.correctCount < sd.total ? '<p class="text-xs text-gray-400 mt-4">提示：若需重新考核错题，请先下载【系统重练包】，并在首页导入。</p>' : ''}
    </div>
    `;

    let detailsHtml = '<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 md:p-8"><h3 class="text-lg font-bold text-gray-800 mb-6">题目解析明细</h3><div class="space-y-6">';
    
    questions.forEach(q => {
        const uAns = userAnswers[q.id];
        const isCorrect = uAns === q.correctAnswer;
        
        let displayUAns = uAns || '未作答';
        let displayCAns = q.correctAnswer;
        if (q.type === 'judge') {
            displayUAns = displayUAns === 'T' ? '正确' : (displayUAns === 'F' ? '错误' : displayUAns);
            displayCAns = displayCAns === 'T' ? '正确' : '错误';
        }

        let optsHtml = '<div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">';
        q.options.forEach(opt => {
            const isOptCorrect = q.correctAnswer.includes(opt.letter);
            optsHtml += `<div class="text-sm flex items-start ${isOptCorrect ? 'text-green-700 font-semibold' : 'text-gray-600'}">
                            <span class="mr-2">${opt.letter}.</span>
                            <span class="whitespace-pre-wrap">${opt.text}</span>
                         </div>`;
        });
        optsHtml += '</div>';

        const iconHtml = isCorrect 
            ? `<svg class="text-green-500 w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>` 
            : `<svg class="text-red-500 w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;

        detailsHtml += `
        <div class="p-5 border border-gray-100 rounded-lg bg-gray-50/50">
            <div class="flex items-start justify-between mb-4">
                <h4 class="text-base font-medium text-gray-800 whitespace-pre-wrap leading-relaxed pr-4">
                    <span class="font-bold mr-2">${q.originalNumber}.</span>${q.text}
                </h4>
                <div class="shrink-0 mt-1">${iconHtml}</div>
            </div>
            ${optsHtml}
            <div class="mt-4 pt-3 border-t text-sm font-medium flex items-center ${isCorrect ? 'text-green-700' : 'text-red-700'}">
                <span class="mr-6">标准答案：${displayCAns}</span>
                <span>考生作答：${displayUAns}</span>
            </div>
        </div>`;
    });
    
    detailsHtml += '</div></div>';
    document.getElementById('app-container').innerHTML = reportHtml + detailsHtml;
}

// ==========================================
// 4. 双轨导出功能 (Word背诵版 + JSON重练版)
// ==========================================
function exportWrongQuestionsDoc() {
    const wrongQs = questions.filter(q => userAnswers[q.id] !== q.correctAnswer);
    if (wrongQs.length === 0) return;

    let html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
    <head><meta charset='utf-8'><title>错题档案</title>
    <style>
        body { font-family: 'SimSun', 'Microsoft YaHei', sans-serif; font-size: 14pt; line-height: 1.5; }
        .title { text-align: center; font-size: 20pt; font-weight: bold; margin-bottom: 20px; }
        .q-title { font-weight: bold; margin-top: 24px; margin-bottom: 12px; }
        .q-option { margin-left: 20px; margin-bottom: 8px; }
        .q-analysis { margin-top: 16px; color: #c62828; font-weight: bold; background: #ffebee; padding: 10px; border-radius: 4px; }
    </style>
    </head><body>
    <div class="title">专场考核错题档案</div>`;

    wrongQs.forEach(q => {
        const typeLabel = q.type === 'multiple' ? '【多选题】' : (q.type === 'judge' ? '【判断题】' : '【单选题】');
        html += `<div class="q-title">${q.originalNumber}. ${typeLabel} ${q.text.replace(/\n/g, '<br/>')}</div>`;
        q.options.forEach(opt => {
            html += `<div class="q-option">${opt.letter}. ${opt.text.replace(/\n/g, '<br/>')}</div>`;
        });
        
        let uAns = userAnswers[q.id] || '未作答';
        let cAns = q.correctAnswer;
        if (q.type === 'judge') {
            uAns = uAns === 'T' ? '正确' : (uAns === 'F' ? '错误' : uAns);
            cAns = cAns === 'T' ? '正确' : '错误';
        }
        html += `<div class="q-analysis">标准答案：${cAns} &nbsp;&nbsp;|&nbsp;&nbsp; 考生作答：${uAns}</div>`;
    });

    html += `</body></html>`;
    const blob = new Blob([html], { type: 'application/msword;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `错题档案_背诵版_${new Date().getTime()}.doc`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

function exportWrongQuestionsJson() {
    const wrongQs = questions.filter(q => userAnswers[q.id] !== q.correctAnswer);
    if (wrongQs.length === 0) return;
    
    const blob = new Blob([JSON.stringify(wrongQs, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `错题档案_系统重练包_${new Date().getTime()}.json`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

// 启动应用
window.onload = initApp;

</script>
